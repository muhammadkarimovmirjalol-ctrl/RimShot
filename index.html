*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#05050a;font-family:'Outfit',sans-serif;color:#f8fafc}
#container{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}

/* HUD & UI */
#hud{position:fixed;top:0;left:0;width:100%;z-index:50;background:rgba(5,10,20,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.1);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}

.hs-n{font-family:'Share Tech Mono',monospace;font-size:28px;font-weight:bold}

.hs-c.urg{color:#ef4444;animation:blnk .5s infinite alternate}

.hb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:4px 10px;font-size:12px;font-weight:700}

.hbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#94a3b8;padding:5px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:.2s}
.hbtn:hover{background:rgba(255,255,255,.2);color:#fff}

/* Instructions Banner */
#instructions{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.85);border:1px solid rgba(251,191,36,.3);padding:6px 16px;border-radius:20px;font-size:11px;color:#cbd5e1;z-index:45;pointer-events:none;display:flex;gap:12px;align-items:center;box-shadow:0 4px 15px rgba(0,0,0,.5)}

/* Touch controls for mobile/tablet */
#tpad{position:fixed;bottom:15px;left:15px;display:flex;gap:12px;z-index:60}
.tbtn{width:56px;height:56px;border-radius:50%;background:rgba(15,23,42,.8);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.6);cursor:pointer;user-select:none}

.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,10,20,.94);backdrop-filter:blur(20px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}

.card{background:rgba(15,23,42,.9);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:20px 24px;width:380px;max-width:95%;display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,.6)}
.card label{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.card input,.card select{background:rgba(2,6,23,.9)!important;border:1.5px solid rgba(255,255,255,.16)!important;color:#fff!important;padding:10px 14px!important;border-radius:12px!important;font-size:14px!important;outline:none!important;width:100%!important;font-family:'Outfit',sans-serif!important}
.btn-g{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:#fff;font-size:16px;font-weight:900;padding:12px 36px;border-radius:30px;cursor:pointer;box-shadow:0 0 25px rgba(245,158,11,.5);letter-spacing:2px;text-transform:uppercase;transition:.2s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 0 35px rgba(245,158,11,.8)}

.btn-gh:hover{background:rgba(255,255,255,.18);color:#fff}
</style>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// 1. SOUND SYNTHESIZER (Web Audio API - Zero External Assets)
// ═══════════════════════════════════════════════════════════════════════════
const snd = {
  ac: null,
  init(){ if(!this.ac) try{ this.ac = new (AudioContext || webkitAudioContext)(); }catch(e){} },
  p(f,t='sine',d=.15,v=.12){
    if(!sndOn||!this.ac) return;
    try{
      const o=this.ac.createOscillator(), g=this.ac.createGain();
      o.connect(g); g.connect(this.ac.destination);
      o.type=t; o.frequency.value=f;
      g.gain.setValueAtTime(v,this.ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,this.ac.currentTime+d);
      o.start(); o.stop(this.ac.currentTime+d+.02);
    }catch(e){}
  },
  bounce(){ this.p(110,'sine',.1,.12); },
  swish(){ this.p(650,'triangle',.18,.14); },
  rim(){ this.p(850,'square',.08,.08); },
  steal(){ this.p(320,'sawtooth',.08,.12); },
  whistle(){ this.p(2600,'sine',.35,.22); },
  celebrate(){ this.p(523,'triangle',.3,.18); setTimeout(()=>this.p(659,'triangle',.3,.18),150); setTimeout(()=>this.p(784,'triangle',.4,.22),300); },
  beep(){ this.p(880,'square',.1,.15); },
  _b: null,
  startBGM(){
    if(this._b) return; this.init(); if(!this.ac) return;
    const m=[261,329,392,523,440,349,293,246]; let i=0;
    this._b=setInterval(()=>{ if(!sndOn||gSt!=='play') return; this.p(m[i%m.length],'triangle',.25,.03); i++; },400);
  },
  stopBGM(){ if(this._b){ clearInterval(this._b); this._b=null; } }
};
let sndOn = true;
function toggleSnd(){ sndOn=!sndOn; if(!sndOn) snd.stopBGM(); else if(gSt==='play') snd.startBGM(); }

// ═══════════════════════════════════════════════════════════════════════════
// 2. THREE.JS 3D ENGINE & ARENA SETUP
// ═══════════════════════════════════════════════════════════════════════════
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c16);
scene.fog = new THREE.FogExp2(0x0a0c16, 0.0022);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
const ambLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xfff8e7, 0.95);
dirLight.position.set(40, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 10;
dirLight.shadow.camera.far = 300;
const d = 160;
dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
scene.add(dirLight);

// Spotlights above hoops
const spotL = new THREE.PointLight(0xffaa44, 0.8, 120);
spotL.position.set(-120, 50, 0); scene.add(spotL);
const spotR = new THREE.PointLight(0xffaa44, 0.8, 120);
spotR.position.set(120, 50, 0); scene.add(spotR);

// ═══════════════════════════════════════════════════════════════════════════
// 3. REALISTIC NBA/FIBA PARQUET HARDWOOD COURT (No Soccer Markings!)
// ═══════════════════════════════════════════════════════════════════════════
const CW = 280, CH = 150; // Court dimensions in 3D world units
function createCourtTexture(){
  const cv = document.createElement('canvas');
  cv.width = 2048; cv.height = 1024;
  const c = cv.getContext('2d');
  
  // Parquet wood background
  c.fillStyle = '#c88a47'; c.fillRect(0, 0, 2048, 1024);
  c.fillStyle = '#be803d';
  for(let x=0; x<2048; x+=64){
    for(let y=0; y<1024; y+=32){
      if((x/64 + y/32)%2 === 0) c.fillRect(x, y, 63, 31);
    }
  }
  
  // Court border padding
  c.fillStyle = '#92400e';
  c.fillRect(0, 0, 2048, 60); c.fillRect(0, 1024-60, 2048, 60);
  c.fillRect(0, 0, 80, 1024); c.fillRect(2048-80, 0, 80, 1024);
  
  // White boundary lines
  c.strokeStyle = '#ffffff'; c.lineWidth = 8;
  c.strokeRect(80, 60, 2048-160, 1024-120);
  
  // Center line & circle
  c.beginPath(); c.moveTo(1024, 60); c.lineTo(1024, 1024-60); c.stroke();
  c.beginPath(); c.arc(1024, 512, 120, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.arc(1024, 512, 40, 0, Math.PI*2); c.fillStyle='#f59e0b'; c.fill(); c.stroke();
  
  // Left Hoop Key (Paint Area)
  c.fillStyle = 'rgba(217, 119, 6, 0.7)';
  c.fillRect(80, 512-110, 290, 220);
  c.strokeRect(80, 512-110, 290, 220);
  c.beginPath(); c.arc(80+290, 512, 90, -Math.PI/2, Math.PI/2); c.stroke();
  
  // Left 3-Point Arc
  c.beginPath();
  c.moveTo(80, 512-300); c.lineTo(80+80, 512-300);
  c.arc(80+70, 512, 380, -Math.PI*0.42, Math.PI*0.42);
  c.lineTo(80, 512+300); c.stroke();

  // Right Hoop Key (Paint Area)
  c.fillRect(2048-80-290, 512-110, 290, 220);
  c.strokeRect(2048-80-290, 512-110, 290, 220);
  c.beginPath(); c.arc(2048-80-290, 512, 90, Math.PI/2, -Math.PI/2); c.stroke();
  
  // Right 3-Point Arc
  c.beginPath();
  c.moveTo(2048-80, 512-300); c.lineTo(2048-80-80, 512-300);
  c.arc(2048-80-70, 512, 380, Math.PI - Math.PI*0.42, Math.PI + Math.PI*0.42);
  c.lineTo(2048-80, 512+300); c.stroke();
  
  // Text Banners on baseline
  c.font = '900 45px Outfit'; c.fillStyle = '#ffffff'; c.textAlign = 'center';
  c.fillText('RIMSHOT PRO ARENA', 1024, 45);
  c.fillText('STREET 5v5 CHAMPIONSHIP', 1024, 1024-15);
  
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 16;
  return tex;
}

const courtGeo = new THREE.PlaneGeometry(CW + 30, CH + 20);
const courtMat = new THREE.MeshStandardMaterial({
  map: createCourtTexture(),
  roughness: 0.35,
  metalness: 0.1
});
const court = new THREE.Mesh(courtGeo, courtMat);
court.rotation.x = -Math.PI/2;
court.receiveShadow = true;
scene.add(court);

// Court Perimeter LED Advertising Boards
function createLEDBoard(w, h, text, color){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=64;
  const c=cv.getContext('2d');
  c.fillStyle=color; c.fillRect(0,0,512,64);
  c.font='900 32px Outfit'; c.fillStyle='#fff'; c.textAlign='center';
  c.fillText(text, 256, 42);
  const tex=new THREE.CanvasTexture(cv);
  const m=new THREE.MeshBasicMaterial({map:tex});
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, 2), m);
}
const ledTop = createLEDBoard(CW+30, 8, '🔥 RIMSHOT 3D PRO ARENA — REALISTIC NBA 2K EXPERIENCE 🔥', '#b45309');
ledTop.position.set(0, 4, -(CH/2 + 11)); scene.add(ledTop);
const ledBot = createLEDBoard(CW+30, 8, '⚡ 5v5 STREET BASKETBALL — OFFICIAL FIBA RULES ⚡', '#0f172a');
ledBot.position.set(0, 4, (CH/2 + 11)); scene.add(ledBot);

// ═══════════════════════════════════════════════════════════════════════════
// 4. BASKETBALL HOOPS & GLASS BACKBOARDS
// ═══════════════════════════════════════════════════════════════════════════
const HOOP_L = new THREE.Vector3(-CW/2 + 14, 10, 0);
const HOOP_R = new THREE.Vector3(CW/2 - 14, 10, 0);

function createHoop(isRight){
  const group = new THREE.Group();
  const dir = isRight ? -1 : 1;
  const xPos = (CW/2 - 4) * (isRight ? 1 : -1);
  
  // Pole Stanchion
  const poleGeo = new THREE.CylinderGeometry(1.5, 2.5, 16, 12);
  const poleMat = new THREE.MeshStandardMaterial({color: 0x334155, metalness:0.6, roughness:0.4});
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.set(xPos - dir*12, 8, 0); pole.castShadow = true; group.add(pole);
  
  // Arm connected to backboard
  const arm = new THREE.Mesh(new THREE.BoxGeometry(14, 1.5, 1.5), poleMat);
  arm.position.set(xPos - dir*6, 13.5, 0); group.add(arm);
  
  // Glass Backboard
  const bbGeo = new THREE.BoxGeometry(1, 12, 20);
  const bbMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff, transparent: true, opacity: 0.75, roughness: 0.1, transmission: 0.9, thickness: 1.2
  });
  const bb = new THREE.Mesh(bbGeo, bbMat);
  bb.position.set(xPos, 14, 0); bb.castShadow = true; group.add(bb);
  
  // Backboard red square frame
  const frameMat = new THREE.MeshBasicMaterial({color: 0xdc2626});
  const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 5, 7), frameMat);
  frame.position.set(xPos + dir*0.1, 13, 0); group.add(frame);
  
  // Orange Rim
  const rimGeo = new THREE.TorusGeometry(3.2, 0.4, 8, 20);
  const rimMat = new THREE.MeshStandardMaterial({color: 0xea580c, roughness:0.2});
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.rotation.x = Math.PI/2;
  rim.position.set(xPos + dir*3.6, 10, 0); rim.castShadow = true; group.add(rim);
  
  // White Net (Cone cylinder)
  const netGeo = new THREE.CylinderGeometry(3.2, 2.2, 5, 12, 1, true);
  const netMat = new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true, transparent:true, opacity:0.8});
  const net = new THREE.Mesh(netGeo, netMat);
  net.position.set(xPos + dir*3.6, 7.5, 0); group.add(net);
  
  scene.add(group);
}
createHoop(false); // Left hoop
createHoop(true);  // Right hoop

// ═══════════════════════════════════════════════════════════════════════════
// 5. ARTICULATED 3D PLAYERS & AI SPACING (SOLVING THE BEE SWARM!)
// ═══════════════════════════════════════════════════════════════════════════
const SKINS = [0xf5b041, 0xd4a76a, 0xc8956c, 0xa57b59, 0xf0d0a8, 0x8d5524];
const SHOES = [0x1e293b, 0xdc2626, 0x2563eb, 0x10b981, 0xf59e0b];
const YNUM = ['#23', '#7', '#11', '#5', '#3'];
const WNUM = ['#99', '#14', '#8', '#2', '#21'];

function makeJerseyTexture(colorHex, numStr){
  const cv=document.createElement('canvas'); cv.width=128; cv.height=128;
  const c=cv.getContext('2d');
  c.fillStyle = colorHex; c.fillRect(0,0,128,128);
  c.font = '900 52px Outfit'; c.fillStyle = '#ffffff'; c.textAlign = 'center';
  c.fillText(numStr, 64, 82);
  return new THREE.CanvasTexture(cv);
}

class Player3D {
  constructor(id, x, z, team, isUser){
    this.id = id; this.team = team; this.isUser = isUser;
    this.pos = new THREE.Vector3(x, 0, z);
    this.vel = new THREE.Vector3(0, 0, 0);
    this.yaw = team === 0 ? Math.PI/2 : -Math.PI/2;
    this.targetYaw = this.yaw;
    this.speed = 0; this.jumping = false; this.jumpVy = 0;
    this.boost = 0; this.celeb = 0; this.hasBall = false;
    
    // Tactical Basketball Home Coordinates (PG, SG, SF, PF, C)
    const roleIdx = id % 5;
    const dir = team === 0 ? -1 : 1;
    const homeX = [dir*30, dir*60, dir*60, dir*90, dir*100][roleIdx];
    const homeZ = [0, -45, 45, -30, 25][roleIdx];
    this.homePos = new THREE.Vector3(homeX, 0, homeZ);
    
    this.group = new THREE.Group();
    this.group.position.copy(this.pos);
    scene.add(this.group);
    
    // Shadow
    const shMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.4});
    const shadow = new THREE.Mesh(new THREE.CircleGeometry(2.8, 16), shMat);
    shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.05;
    this.group.add(shadow);
    
    // Body Container (rotates with yaw)
    this.body = new THREE.Group();
    this.group.add(this.body);
    
    const skinColor = SKINS[id % SKINS.length];
    const shoeColor = SHOES[id % SHOES.length];
    const jerseyHex = team === 0 ? '#f59e0b' : '#334155';
    const numStr = team === 0 ? YNUM[roleIdx] : WNUM[roleIdx];
    
    // Torso (Jersey)
    const jTex = makeJerseyTexture(jerseyHex, numStr);
    const torsoMat = [
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({map: jTex}), // Front
      new THREE.MeshStandardMaterial({map: jTex})  // Back
    ];
    this.torso = new THREE.Mesh(new THREE.BoxGeometry(3.2, 5, 1.8), torsoMat);
    this.torso.position.y = 7.5; this.torso.castShadow = true;
    this.body.add(this.torso);
    
    // Head
    const headMat = new THREE.MeshStandardMaterial({color: skinColor, roughness:0.5});
    this.head = new THREE.Mesh(new THREE.SphereGeometry(1.4, 16, 16), headMat);
    this.head.position.y = 11.2; this.head.castShadow = true;
    this.body.add(this.head);
    
    // User Indicator Arrow above head
    if(isUser){
      const arrMat = new THREE.MeshBasicMaterial({color: 0xfbbf24});
      const arr = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2, 8), arrMat);
      arr.rotation.x = Math.PI; arr.position.y = 13.8;
      this.body.add(arr);
    }
    
    // Limbs pivoted at shoulders/hips
    const limbMat = new THREE.MeshStandardMaterial({color: skinColor});
    const shoeMat = new THREE.MeshStandardMaterial({color: shoeColor});
    
    this.armL = new THREE.Mesh(new THREE.BoxGeometry(0.9, 4.5, 0.9), limbMat);
    this.armL.position.set(-2.1, 7.5, 0); this.armL.castShadow = true; this.body.add(this.armL);
    
    this.armR = new THREE.Mesh(new THREE.BoxGeometry(0.9, 4.5, 0.9), limbMat);
    this.armR.position.set(2.1, 7.5, 0); this.armR.castShadow = true; this.body.add(this.armR);
    
    this.legL = new THREE.Group(); this.legL.position.set(-0.9, 5, 0);
    const lMesh = new THREE.Mesh(new THREE.BoxGeometry(1.1, 4.8, 1.1), limbMat); lMesh.position.y = -2.4; lMesh.castShadow=true;
    const lShoe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 1.6), shoeMat); lShoe.position.set(0, -4.5, 0.2); lShoe.castShadow=true;
    this.legL.add(lMesh); this.legL.add(lShoe); this.body.add(this.legL);
    
    this.legR = new THREE.Group(); this.legR.position.set(0.9, 5, 0);
    const rMesh = new THREE.Mesh(new THREE.BoxGeometry(1.1, 4.8, 1.1), limbMat); rMesh.position.y = -2.4; rMesh.castShadow=true;
    const rShoe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 1.6), shoeMat); rShoe.position.set(0, -4.5, 0.2); rShoe.castShadow=true;
    this.legR.add(rMesh); this.legR.add(rShoe); this.body.add(this.legR);
  }

  update(dt, sysT){
    if(this.boost > 0) this.boost--;
    if(this.celeb > 0) this.celeb--;
    
    // Apply velocity and jumping
    if(this.jumping){
      this.pos.y += this.jumpVy;
      this.jumpVy -= 0.6; // Gravity
      if(this.pos.y <= 0){
        this.pos.y = 0; this.jumping = false; this.jumpVy = 0;
      }
    }
    
    this.pos.add(this.vel);
    // Court boundaries
    this.pos.x = Math.max(-CW/2 + 3, Math.min(CW/2 - 3, this.pos.x));
    this.pos.z = Math.max(-CH/2 + 3, Math.min(CH/2 - 3, this.pos.z));
    
    this.group.position.copy(this.pos);
    
    // Smooth Spherical Lerp for rotation
    let diff = this.targetYaw - this.yaw;
    while(diff < -Math.PI) diff += Math.PI*2;
    while(diff > Math.PI) diff -= Math.PI*2;
    this.yaw += diff * 0.18;
    this.body.rotation.y = this.yaw;
    
    // Animate Limbs (Gait cycle)
    const spd = this.vel.length();
    if(spd > 0.1 && !this.jumping){
      const freq = sysT * 0.25;
      this.legL.rotation.x = Math.sin(freq) * 0.7;
      this.legR.rotation.x = -Math.sin(freq) * 0.7;
      if(!this.hasBall){
        this.armL.rotation.x = -Math.sin(freq) * 0.6;
        this.armR.rotation.x = Math.sin(freq) * 0.6;
      }
    } else if(!this.jumping){
      this.legL.rotation.x *= 0.8;
      this.legR.rotation.x *= 0.8;
      if(!this.hasBall){ this.armL.rotation.x *= 0.8; this.armR.rotation.x *= 0.8; }
    }
    
    if(this.jumping){
      this.armL.rotation.x = Math.PI - 0.3;
      this.armR.rotation.x = Math.PI - 0.3;
      this.legL.rotation.x = -0.3;
      this.legR.rotation.x = 0.4;
    }
  }
}

let players = [], user = null;
function makeTeams(){
  players.forEach(p => scene.remove(p.group));
  players = [];
  const startZ = [0, -35, 35, -20, 20];
  for(let i=0; i<5; i++){
    const p = new Player3D(i, -40 - i*15, startZ[i], 0, i===0);
    if(i===0) user = p;
    players.push(p);
  }
  for(let i=0; i<5; i++){
    players.push(new Player3D(5+i, 40 + i*15, startZ[i], 1, false));
  }
}

// 6. 3D BASKETBALL PHYSICS
// ═══════════════════════════════════════════════════════════════════════════
const ballMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1.6, 16, 16),
  new THREE.MeshStandardMaterial({color: 0xea580c, roughness:0.3})
);
ballMesh.castShadow = true;
scene.add(ballMesh);

const ball = {
  pos: new THREE.Vector3(0, 5, 0),
  vel: new THREE.Vector3(0, 0, 0),
  carrier: null, carried: false, scored: false, imm: 0,
  update(sysT){
    if(this.imm > 0) this.imm--;
    
    if(this.carried && this.carrier){
      this.carrier.hasBall = true;
      // Ball naturally bounces in active dribble hand!
      const p = this.carrier;
      const handOffset = new THREE.Vector3(0, 4.5 + Math.abs(Math.sin(sysT*0.25))*3.5, 3.2);
      handOffset.applyAxisAngle(new THREE.Vector3(0,1,0), p.yaw);
      this.pos.copy(p.pos).add(handOffset);
      ballMesh.position.copy(this.pos);
      ballMesh.rotation.x += 0.1;
      return;
    }
    
    players.forEach(p => p.hasBall = false);
    
    this.pos.add(this.vel);
    this.vel.y -= 0.5; // Gravity
    this.vel.x *= 0.98; this.vel.z *= 0.98;
    
    if(this.pos.y <= 1.6){
      this.pos.y = 1.6;
      if(this.vel.y < -1.5) snd.bounce();
      this.vel.y = -this.vel.y * 0.6;
      if(Math.abs(this.vel.y) < 0.8) this.vel.y = 0;
    }
    
    ballMesh.position.copy(this.pos);
    ballMesh.rotation.x += this.vel.z * 0.05;
    ballMesh.rotation.z -= this.vel.x * 0.05;
    
    // Check out of bounds
    if((Math.abs(this.pos.x) > CW/2 + 2 || Math.abs(this.pos.z) > CH/2 + 2) && !this.scored){
      snd.whistle(); popText('⚠️ OUT OF BOUNDS!', '#ef4444');
      this.scored = true;
      setTimeout(() => giveBallToTeam(this.pos.x < 0 ? 0 : 1), 800);
    }
    
    // Check Goal Scoring
    if(!this.scored && this.vel.y < 0){
      if(this.pos.distanceTo(HOOP_R) < 3.5 && Math.abs(this.pos.y - HOOP_R.y) < 2) scoreGoal(0);
      if(this.pos.distanceTo(HOOP_L) < 3.5 && Math.abs(this.pos.y - HOOP_L.y) < 2) scoreGoal(1);
    }
    
    // Ball Pickup
    if(this.imm === 0 && !this.carried){
      for(const p of players){
        if(p.pos.distanceTo(this.pos) < 5.5 && Math.abs(p.pos.y - this.pos.y) < 6){
          this.carried = true; this.carrier = p;
          this.vel.set(0,0,0);
          if(p === user) popText('🏀 TO\'P SIZDA!', '#fbbf24');
          break;
        }
      }
    }
  }
};

function doShoot(p){
  if(!ball.carried || ball.carrier !== p) return;
  const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
  ball.carried = false; ball.carrier = null; p.hasBall = false;
  ball.scored = false; ball.imm = 40;
  
  const dist = p.pos.distanceTo(targetHoop);
  const time = dist / 3.8;
  ball.vel.x = (targetHoop.x - ball.pos.x) / time;
  ball.vel.z = (targetHoop.z - ball.pos.z) / time;
  ball.vel.y = (targetHoop.y - ball.pos.y + 0.5 * 0.5 * time * time) / time;
  
  snd.swish();
  if(!p.jumping){ p.jumpVy = 1.6; p.jumping = true; }
}

function doPass(p){
  if(!ball.carried || ball.carrier !== p) return;
  const mates = players.filter(t => t.team === p.team && t !== p);
  const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
  mates.sort((a,b) => a.pos.distanceTo(targetHoop) - b.pos.distanceTo(targetHoop));
  const target = mates[0];
  
  ball.carried = false; ball.carrier = null; p.hasBall = false;
  ball.scored = false; ball.imm = 20;
  
  const time = 16;
  ball.vel.x = (target.pos.x - ball.pos.x) / time;
  ball.vel.z = (target.pos.z - ball.pos.z) / time;
  ball.vel.y = 1.2;
  
  snd.swish(); if(p === user) popText('📤 PASS!', '#60a5fa');
}

function giveBallToTeam(team){
  const tp = players.filter(p => p.team === team);
  if(!tp.length) return;
  const p = tp[0];
  ball.carried = true; ball.carrier = p;
  ball.scored = false; ball.imm = 25;
  ball.vel.set(0,0,0); ball.pos.copy(p.pos);
}

let uSc = 0, bSc = 0;
function scoreGoal(team){
  ball.scored = true; ball.vel.multiplyScalar(0.2);
  snd.whistle(); snd.celebrate();
  if(team === 0){
    uSc++; document.getElementById('sc-y').textContent = String(uSc*2).padStart(2,'0');
    popText('🏀 GOL! +2 OCHKO', '#fbbf24');
    players.filter(p => p.team===0).forEach(p => p.celeb = 80);
  } else {
    bSc++; document.getElementById('sc-w').textContent = String(bSc*2).padStart(2,'0');
    popText('🏀 RAQIB GOL UTRDI!', '#cbd5e1');
    players.filter(p => p.team===1).forEach(p => p.celeb = 80);
  }
  setTimeout(() => giveBallToTeam(team === 0 ? 1 : 0), 1200);
}

// 7. 360° ORBITAL CHASE CAMERA & INPUT (Yerda yuryapkandek va User orqasida!)
// ═══════════════════════════════════════════════════════════════════════════
let camYaw = Math.PI/2, camPitch = 0.35;
let isPointerLocked = false;

// Request Pointer Lock on click for smooth 360 rotation without boundaries
renderer.domElement.addEventListener('click', ()=>{
  if(gSt === 'play'){
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', ()=>{
  isPointerLocked = (document.pointerLockElement === renderer.domElement);
});

document.addEventListener('mousemove', (e)=>{
  if(gSt !== 'play' || !user) return;
  if(isPointerLocked || e.buttons === 1){
    camYaw -= e.movementX * 0.006;
    camPitch = Math.max(0.1, Math.min(1.2, camPitch + e.movementY * 0.005));
  }
});

// Touch drag for camera rotation on mobile
let lastTouchX = 0, lastTouchY = 0;
renderer.domElement.addEventListener('touchstart', (e)=>{
  if(e.touches.length === 1){
    lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
  }
});
renderer.domElement.addEventListener('touchmove', (e)=>{
  if(gSt === 'play' && e.touches.length === 1){
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    camYaw -= dx * 0.008;
    camPitch = Math.max(0.1, Math.min(1.2, camPitch + dy * 0.008));
    lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
  }
});

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function handleInput(){
  if(gSt !== 'play' || !user) return;
  if(keys['escape']){ togglePause(); return; }
  
  // W/A/S/D movement mapped RELATIVE to the 360° camera direction!
  let moveX = 0, moveZ = 0;
  if(keys['w'] || keys['arrowup']) moveZ -= 1;
  if(keys['s'] || keys['arrowdown']) moveZ += 1;
  if(keys['a'] || keys['arrowleft']) moveX -= 1;
  if(keys['d'] || keys['arrowright']) moveX += 1;
  
  const spd = user.boost > 0 ? 1.6 : (diff==='easy' ? 1.1 : 1.3);
  
  if(moveX !== 0 || moveZ !== 0){
    // Calculate world movement angle relative to camYaw
    const inputAngle = Math.atan2(moveX, moveZ);
    const worldAngle = camYaw + inputAngle;
    
    user.vel.x = Math.sin(worldAngle) * spd;
    user.vel.z = Math.cos(worldAngle) * spd;
    user.targetYaw = worldAngle;
  } else {
    user.vel.x *= 0.8; user.vel.z *= 0.8;
  }
  
  // Actions
  if((keys[' '] || keys['jump']) && !user.jumping && user.pos.y <= 0){
    user.jumpVy = 1.6; user.jumping = true; snd.bounce();
  }
  if(keys['k'] || keys['shoot']){
    keys['k']=false; keys['shoot']=false;
    if(ball.carrier === user) doShoot(user);
    else if(!ball.carried && ball.imm === 0 && user.pos.distanceTo(ball.pos) < 10){
      ball.carried = true; ball.carrier = user; ball.vel.set(0,0,0);
      popText('🏀 OLDIM!', '#fbbf24');
    } else if(ball.carrier && ball.carrier.team !== 0 && user.pos.distanceTo(ball.carrier.pos) < 10){
      ball.carrier = user; ball.carried = true; snd.steal();
      popText('🔥 STEAL!', '#10b981');
    }
  }
  if((keys['f'] || keys['pass']) && ball.carrier === user){
    keys['f']=false; keys['pass']=false; doPass(user);
  }
  if(keys['e'] || keys['boost']){
    keys['e']=false; keys['boost']=false; user.boost = 120; snd.steal();
    popText('⚡ BOOST!', '#38bdf8');
  }
}

function updateCamera(){
  if(!user) return;
  // Third-person chase camera positioned smoothly behind the user
  const dist = user.boost > 0 ? 36 : 30;
  const targetX = user.pos.x - Math.sin(camYaw) * dist * Math.cos(camPitch);
  const targetY = user.pos.y + 12 + Math.sin(camPitch) * dist;
  const targetZ = user.pos.z - Math.cos(camYaw) * dist * Math.cos(camPitch);
  
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.12);
  camera.lookAt(user.pos.x, user.pos.y + 9, user.pos.z);
}

// ═══════════════════════════════════════════════════════════════════════════
// 8. TACTICAL 5v5 AI (SOLVING THE SWARM / BEE CLUSTER BUG!)
// ═══════════════════════════════════════════════════════════════════════════
function updateAI(){
  players.forEach(p => {
    if(p.isUser) return;
    if(p.celeb > 0){ p.vel.multiplyScalar(0.8); return; }
    
    const spd = diff==='hard' ? 1.25 : 1.05;
    const isOffense = (ball.carrier && ball.carrier.team === p.team) || (!ball.carrier && p.team === 0);
    const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
    
    if(ball.carrier === p){
      // Ball handler drives towards hoop or shoots
      const dist = p.pos.distanceTo(targetHoop);
      if(dist < 55 && Math.random() < 0.03){ doShoot(p); return; }
      
      // Look for open pass if blocked
      let minEnemyDist = 999;
      players.filter(o=>o.team!==p.team).forEach(o => {
        const d = p.pos.distanceTo(o.pos); if(d < minEnemyDist) minEnemyDist = d;
      });
      if(minEnemyDist < 12 && Math.random() < 0.05){ doPass(p); return; }
      
      p.targetYaw = Math.atan2(targetHoop.x - p.pos.x, targetHoop.z - p.pos.z);
      p.vel.x = Math.sin(p.targetYaw) * spd;
      p.vel.z = Math.cos(p.targetYaw) * spd;
    } 
    else if(!ball.carried){
      // Loose ball: ONLY the closest 2 players run for it, others stay spaced!
      const allSorted = [...players].sort((a,b) => a.pos.distanceTo(ball.pos) - b.pos.distanceTo(ball.pos));
      if(allSorted[0] === p || allSorted[1] === p){
        p.targetYaw = Math.atan2(ball.pos.x - p.pos.x, ball.pos.z - p.pos.z);
        p.vel.x = Math.sin(p.targetYaw) * spd;
        p.vel.z = Math.cos(p.targetYaw) * spd;
      } else {
        moveToZone(p, p.homePos, spd * 0.8);
      }
    } 
    else if(isOffense){
      // OFFENSIVE SPACING: Never swarm ball carrier! Move around assigned home coordinates!
      const dynamicHome = p.homePos.clone();
      dynamicHome.x += (ball.pos.x * 0.3); // Shift slightly with ball
      moveToZone(p, dynamicHome, spd * 0.85);
    } 
    else {
      // DEFENSIVE SPACING: Man-to-man defense! Guard your assigned opponent index!
      const opp = players[p.id % 5 + (p.team===0 ? 5 : 0)];
      if(opp){
        // Stay between opponent and your hoop!
        const defPos = opp.pos.clone().lerp(p.team===0 ? HOOP_L : HOOP_R, 0.25);
        moveToZone(p, defPos, spd * 0.95);
        
        // Attempt steal or block if close
        if(ball.carrier === opp && p.pos.distanceTo(opp.pos) < 10){
          if(Math.random() < 0.02){
            ball.carrier = p; ball.carried = true; snd.steal();
            popText('🤙 STEAL!', '#10b981');
          }
          if(opp.jumping && !p.jumping && Math.random() < 0.3){
            p.jumpVy = 1.6; p.jumping = true;
          }
        }
      }
    }
  });
  
  // Physical player-to-player collision (body bumps)
  for(let i=0; i<players.length; i++){
    for(let j=i+1; j<players.length; j++){
      const a = players[i], b = players[j];
      const dist = a.pos.distanceTo(b.pos);
      if(dist < 5.0 && dist > 0.1){
        const push = (5.0 - dist) * 0.5;
        const dir = new THREE.Vector3().subVectors(b.pos, a.pos).normalize();
        a.pos.addScaledVector(dir, -push);
        b.pos.addScaledVector(dir, push);
      }
    }
  }
}

function moveToZone(p, target, spd){
  const dist = p.pos.distanceTo(target);
  if(dist > 3){
    p.targetYaw = Math.atan2(target.x - p.pos.x, target.z - p.pos.z);
    p.vel.x = Math.sin(p.targetYaw) * spd;
    p.vel.z = Math.cos(p.targetYaw) * spd;
  } else {
    p.vel.x *= 0.8; p.vel.z *= 0.8;
  }
}

// 9. MINIMAP TACTICAL OVERLAY
// ═══════════════════════════════════════════════════════════════════════════
const minimap = document.getElementById('minimap');
const mCtx = minimap.getContext('2d');
function drawMinimap(){
  minimap.width = 180; minimap.height = 100;
  mCtx.fillStyle = '#1e293b'; mCtx.fillRect(0, 0, 180, 100);
  mCtx.strokeStyle = '#cbd5e1'; mCtx.lineWidth = 1.5;
  mCtx.strokeRect(5, 5, 170, 90);
  mCtx.beginPath(); mCtx.moveTo(90, 5); mCtx.lineTo(90, 95); mCtx.stroke();
  
  // Draw players
  players.forEach(p => {
    const mx = 90 + (p.pos.x / (CW/2)) * 80;
    const my = 50 + (p.pos.z / (CH/2)) * 40;
    mCtx.fillStyle = p.isUser ? '#38bdf8' : (p.team===0 ? '#f59e0b' : '#ffffff');
    mCtx.beginPath(); mCtx.arc(mx, my, p.isUser ? 5 : 3.5, 0, Math.PI*2); mCtx.fill();
  });
  
  // Draw ball
  const bx = 90 + (ball.pos.x / (CW/2)) * 80;
  const by = 50 + (ball.pos.z / (CH/2)) * 40;
  mCtx.fillStyle = '#ea580c';
  mCtx.beginPath(); mCtx.arc(bx, by, 3, 0, Math.PI*2); mCtx.fill();
}

function popText(text, color){
  const div = document.createElement('div');
  div.textContent = text;
  div.style.position = 'fixed'; div.style.top = '35%'; div.style.left = '50%';
  div.style.transform = 'translate(-50%, -50%) scale(0.5)';
  div.style.background = 'rgba(15,23,42,0.9)'; div.style.color = color;
  div.style.padding = '12px 28px'; div.style.borderRadius = '30px';
  div.style.font = '900 28px Outfit'; div.style.border = `2px solid ${color}`;
  div.style.boxShadow = `0 0 25px ${color}`; div.style.zIndex = '90';
  div.style.transition = '0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
  document.body.appendChild(div);
  setTimeout(()=>div.style.transform = 'translate(-50%, -100%) scale(1.1)', 20);
  setTimeout(()=>{ div.style.opacity = '0'; setTimeout(()=>div.remove(), 300); }, 1200);
}

let gSt = 'setup', sysT = 0, mTim = 180, tEv = null;

function loop(){
  requestAnimationFrame(loop);
  sysT++;
  
  if(gSt === 'play'){
    handleInput();
    updateAI();
    players.forEach(p => p.update(0.016, sysT));
    ball.update(sysT);
    updateCamera();
    drawMinimap();
    
    const m = Math.floor(mTim/60), s = Math.floor(mTim%60);
    const te = document.getElementById('hud-timer');
    te.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    te.className = 'hs-c' + (mTim<=10 && mTim>0 ? ' urg' : '');
  }
  
  renderer.render(scene, camera);
}
loop();

function startGame(){
  const nm = document.getElementById('inp-name').value || 'Baller_Pro';
  const fl = document.getElementById('inp-country').value || '🇺🇿';
  diff = document.getElementById('inp-diff').value || 'medium';
  document.getElementById('hud-flag').textContent = fl + ' ' + nm;
  
  uSc = 0; bSc = 0; mTim = 180; sysT = 0;
  document.getElementById('sc-y').textContent = '00';
  document.getElementById('sc-w').textContent = '00';
  
  makeTeams();
  giveBallToTeam(0);
  
  ['ov-setup','ov-pause','ov-go'].forEach(id => document.getElementById(id).classList.add('hid'));
  gSt = 'play'; snd.init(); snd.startBGM();
  
  if(tEv) clearInterval(tEv);
  tEv = setInterval(()=>{
    if(gSt !== 'play') return;
    mTim--;
    if(mTim <= 10 && mTim > 0) snd.beep();
    if(mTim <= 0){ clearInterval(tEv); endMatch(); }
  }, 1000);
}

function togglePause(){
  if(gSt === 'play'){ gSt = 'pause'; snd.stopBGM(); document.getElementById('ov-pause').classList.remove('hid'); document.exitPointerLock(); }
  else if(gSt === 'pause') resumeGame();
}
function resumeGame(){ gSt = 'play'; snd.startBGM(); document.getElementById('ov-pause').classList.add('hid'); }
function showSetup(){ gSt = 'setup'; if(tEv) clearInterval(tEv); snd.stopBGM(); ['ov-setup','ov-pause','ov-go'].forEach(id => document.getElementById(id).classList.add('hid')); document.getElementById('ov-setup').classList.remove('hid'); document.exitPointerLock(); }

function endMatch(){
  gSt = 'over'; snd.stopBGM(); document.exitPointerLock();
  const w = uSc >= bSc;
  document.getElementById('go-t').textContent = w ? '🏆 G\'ALABA!' : '😢 YUTQIZDIK!';
  document.getElementById('go-w').textContent = w ? 'Sizning jamoangiz g\'alaba qozondi!' : 'Raqib jamoa g\'alaba qildi.';
  document.getElementById('go-s').textContent = `Sariq: ${uSc*2} — Oq: ${bSc*2}`;
  if(w) snd.celebrate();
  document.getElementById('ov-go').classList.remove('hid');
}

// Touch buttons bindings
function bindT(id, keyStr){
  const el = document.getElementById(id); if(!el) return;
  el.addEventListener('touchstart', e=>{ e.preventDefault(); keys[keyStr]=true; },{passive:false});
  el.addEventListener('touchend', e=>{ e.preventDefault(); keys[keyStr]=false; },{passive:false});
  el.addEventListener('mousedown', ()=>keys[keyStr]=true);
  el.addEventListener('mouseup', ()=>keys[keyStr]=false);
}
bindT('tj','jump'); bindT('ts','shoot'); bindT('tp','pass'); bindT('te','boost');
</script>
