*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#030712;font-family:'Outfit',sans-serif;color:#f8fafc}
#container{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}

/* HUD & UI */
#hud{position:fixed;top:0;left:0;width:100%;z-index:50;background:linear-gradient(to bottom,rgba(3,7,18,.95),rgba(3,7,18,.7));backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.12);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}

.hs-n{font-family:'Share Tech Mono',monospace;font-size:32px;font-weight:bold}

.hs-c.urg{color:#ef4444;animation:blnk .5s infinite alternate}

.hb.gld{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4);color:#fbbf24}
.hbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#cbd5e1;padding:6px 14px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;transition:.2s}
.hbtn:hover{background:rgba(255,255,255,.22);color:#fff}

/* Instructions Banner */
#instructions{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.9);border:1px solid rgba(251,191,36,.4);padding:8px 20px;border-radius:24px;font-size:12px;color:#e2e8f0;z-index:45;pointer-events:none;display:flex;gap:16px;align-items:center;box-shadow:0 6px 25px rgba(0,0,0,.6)}

#minimap{width:100%;height:100%;display:block}

/* Touch controls for mobile/tablet */
#tpad{position:fixed;bottom:20px;left:20px;display:flex;gap:14px;z-index:60}
.tbtn{width:60px;height:60px;border-radius:50%;background:rgba(15,23,42,.85);border:2px solid rgba(255,255,255,.25);color:#fff;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.7);cursor:pointer;user-select:none}
.tbtn:active{transform:scale(.92);background:rgba(245,158,11,.85)}
.tbtn.shoot{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:#fde047;width:70px;height:70px;font-size:24px}

/* Overlays */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(3,7,18,.96);backdrop-filter:blur(24px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px}

.big{font-size:52px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fbbf24,#f87171,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;text-shadow:0 10px 30px rgba(251,191,36,.2)}
.card{background:rgba(15,23,42,.92);border:1.5px solid rgba(255,255,255,.18);border-radius:24px;padding:24px 28px;width:420px;max-width:95%;display:flex;flex-direction:column;gap:14px;box-shadow:0 15px 40px rgba(0,0,0,.8)}
.card label{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px}
.card input,.card select{background:rgba(2,6,23,.95)!important;border:1.5px solid rgba(255,255,255,.2)!important;color:#fff!important;padding:12px 16px!important;border-radius:14px!important;font-size:15px!important;outline:none!important;width:100%!important;font-family:'Outfit',sans-serif!important}
.btn-g{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:#fff;font-size:18px;font-weight:900;padding:14px 40px;border-radius:35px;cursor:pointer;box-shadow:0 0 30px rgba(245,158,11,.6);letter-spacing:2px;text-transform:uppercase;transition:.25s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 0 45px rgba(245,158,11,.9)}
.btn-gh{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#cbd5e1;padding:12px 34px;border-radius:35px;cursor:pointer;font-size:15px;font-weight:700;transition:.2s}
.btn-gh:hover{background:rgba(255,255,255,.2);color:#fff}
</style>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// 1. SOUND SYNTHESIZER (Web Audio API - Zero External Assets)
// ═══════════════════════════════════════════════════════════════════════════
const snd = {
  ac: null,
  init(){ if(!this.ac) try{ this.ac = new (AudioContext || webkitAudioContext)(); }catch(e){} },
  p(f,t='sine',d=.15,v=.12){
    if(!sndOn||!this.ac) return;
    try{
      const o=this.ac.createOscillator(), g=this.ac.createGain();
      o.connect(g); g.connect(this.ac.destination);
      o.type=t; o.frequency.value=f;
      g.gain.setValueAtTime(v,this.ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,this.ac.currentTime+d);
      o.start(); o.stop(this.ac.currentTime+d+.02);
    }catch(e){}
  },
  bounce(){ this.p(110,'sine',.12,.15); },
  swish(){ this.p(650,'triangle',.2,.16); },
  rim(){ this.p(850,'square',.08,.1); },
  steal(){ this.p(320,'sawtooth',.08,.14); },
  whistle(){ this.p(2600,'sine',.35,.25); },
  celebrate(){ this.p(523,'triangle',.3,.2); setTimeout(()=>this.p(659,'triangle',.3,.2),150); setTimeout(()=>this.p(784,'triangle',.4,.25),300); },
  beep(){ this.p(880,'square',.1,.18); },
  _b: null,
  startBGM(){
    if(this._b) return; this.init(); if(!this.ac) return;
    const m=[261,329,392,523,440,349,293,246]; let i=0;
    this._b=setInterval(()=>{ if(!sndOn||gSt!=='play') return; this.p(m[i%m.length],'triangle',.25,.03); i++; },400);
  },
  stopBGM(){ if(this._b){ clearInterval(this._b); this._b=null; } }
};
let sndOn = true;
function toggleSnd(){ sndOn=!sndOn; if(!sndOn) snd.stopBGM(); else if(gSt==='play') snd.startBGM(); }

// ═══════════════════════════════════════════════════════════════════════════
// 2. THREE.JS 3D ENGINE & LIGHTING
// ═══════════════════════════════════════════════════════════════════════════
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814); // Deep stadium atmospheric blue
scene.fog = new THREE.FogExp2(0x050814, 0.0018);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 1200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Arena Bright Lighting
const ambLight = new THREE.AmbientLight(0xffffff, 0.65);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xfff8e7, 1.1);
dirLight.position.set(60, 140, 70);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 10;
dirLight.shadow.camera.far = 400;
const d = 180;
dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);

const spotL = new THREE.PointLight(0xffaa44, 0.9, 150);
spotL.position.set(-130, 60, 0); scene.add(spotL);
const spotR = new THREE.PointLight(0xffaa44, 0.9, 150);
spotR.position.set(130, 60, 0); scene.add(spotR);

// ═══════════════════════════════════════════════════════════════════════════
// 3. REALISTIC NBA/FIBA PARQUET HARDWOOD COURT (No Soccer Markings!)
// ═══════════════════════════════════════════════════════════════════════════
const CW = 280, CH = 150;
function createCourtTexture(){
  const cv = document.createElement('canvas');
  cv.width = 2048; cv.height = 1024;
  const c = cv.getContext('2d');
  
  // Parquet hardwood
  c.fillStyle = '#c88a47'; c.fillRect(0, 0, 2048, 1024);
  c.fillStyle = '#be803d';
  for(let x=0; x<2048; x+=64){
    for(let y=0; y<1024; y+=32){
      if((x/64 + y/32)%2 === 0) c.fillRect(x, y, 63, 31);
    }
  }
  
  // Court border
  c.fillStyle = '#78350f';
  c.fillRect(0, 0, 2048, 60); c.fillRect(0, 1024-60, 2048, 60);
  c.fillRect(0, 0, 80, 1024); c.fillRect(2048-80, 0, 80, 1024);
  
  // White boundary lines
  c.strokeStyle = '#ffffff'; c.lineWidth = 8;
  c.strokeRect(80, 60, 2048-160, 1024-120);
  
  // Center line & circle
  c.beginPath(); c.moveTo(1024, 60); c.lineTo(1024, 1024-60); c.stroke();
  c.beginPath(); c.arc(1024, 512, 120, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.arc(1024, 512, 40, 0, Math.PI*2); c.fillStyle='#f59e0b'; c.fill(); c.stroke();
  
  // Left Key (Paint Area)
  c.fillStyle = 'rgba(217, 119, 6, 0.75)';
  c.fillRect(80, 512-110, 290, 220);
  c.strokeRect(80, 512-110, 290, 220);
  c.beginPath(); c.arc(80+290, 512, 90, -Math.PI/2, Math.PI/2); c.stroke();
  
  // Left 3-Point Arc
  c.beginPath();
  c.moveTo(80, 512-300); c.lineTo(80+80, 512-300);
  c.arc(80+70, 512, 380, -Math.PI*0.42, Math.PI*0.42);
  c.lineTo(80, 512+300); c.stroke();

  // Right Key (Paint Area)
  c.fillRect(2048-80-290, 512-110, 290, 220);
  c.strokeRect(2048-80-290, 512-110, 290, 220);
  c.beginPath(); c.arc(2048-80-290, 512, 90, Math.PI/2, -Math.PI/2); c.stroke();
  
  // Right 3-Point Arc
  c.beginPath();
  c.moveTo(2048-80, 512-300); c.lineTo(2048-80-80, 512-300);
  c.arc(2048-80-70, 512, 380, Math.PI - Math.PI*0.42, Math.PI + Math.PI*0.42);
  c.lineTo(2048-80, 512+300); c.stroke();
  
  // Text Banners
  c.font = '900 45px Outfit'; c.fillStyle = '#ffffff'; c.textAlign = 'center';
  c.fillText('RIMSHOT PRO ARENA', 1024, 45);
  c.fillText('STREET 5v5 CHAMPIONSHIP', 1024, 1024-15);
  
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 16;
  return tex;
}

const courtGeo = new THREE.PlaneGeometry(CW + 30, CH + 20);
const courtMat = new THREE.MeshStandardMaterial({
  map: createCourtTexture(),
  roughness: 0.28,
  metalness: 0.15
});
const court = new THREE.Mesh(courtGeo, courtMat);
court.rotation.x = -Math.PI/2;
court.receiveShadow = true;
scene.add(court);

// Court Perimeter LED Advertising Boards
function createLEDBoard(w, h, text, color){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=64;
  const c=cv.getContext('2d');
  c.fillStyle=color; c.fillRect(0,0,512,64);
  c.font='900 30px Outfit'; c.fillStyle='#fff'; c.textAlign='center';
  c.fillText(text, 256, 42);
  const tex=new THREE.CanvasTexture(cv);
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, 2), new THREE.MeshBasicMaterial({map:tex}));
}
const ledTop = createLEDBoard(CW+30, 8, '🔥 RIMSHOT PRO ARENA — 100% REALISTIC NBA 2K EXPERIENCE 🔥', '#b45309');
ledTop.position.set(0, 4, -(CH/2 + 11)); scene.add(ledTop);
const ledBot = createLEDBoard(CW+30, 8, '⚡ 5v5 STREET BASKETBALL — OFFICIAL FIBA RULES & SPACING ⚡', '#0f172a');
ledBot.position.set(0, 4, (CH/2 + 11)); scene.add(ledBot);

// ═══════════════════════════════════════════════════════════════════════════
// 4. GRANDSTANDS & THOUSANDS OF ANIMATED SPECTATORS (Solving "qop qora bo'lib qolibdi")
// ═══════════════════════════════════════════════════════════════════════════
const crowdInstances = [];
function buildStadium(){
  const stGroup = new THREE.Group();
  
  // Outer stadium concrete floor
  const floorMat = new THREE.MeshStandardMaterial({color:0x0f172a, roughness:0.8});
  const outerFloor = new THREE.Mesh(new THREE.PlaneGeometry(700, 500), floorMat);
  outerFloor.rotation.x = -Math.PI/2; outerFloor.position.y = -0.5;
  stGroup.add(outerFloor);
  
  const standMat = new THREE.MeshStandardMaterial({color:0x1e293b, roughness:0.7});
  const stepMat = new THREE.MeshStandardMaterial({color:0x334155, roughness:0.5});
  const crowdColors = [0xf59e0b, 0xffffff, 0x38bdf8, 0xef4444, 0x10b981, 0x8b5cf6, 0xfacc15];
  
  // Left & Right Sideline Grandstand Tiers (Z axis)
  [-1, 1].forEach(dir => {
    for(let row=0; row<12; row++){
      const zPos = dir * (CH/2 + 20 + row*12);
      const yPos = row * 6 + 3;
      
      const step = new THREE.Mesh(new THREE.BoxGeometry(CW + 80, 6, 12), row%2===0 ? standMat : stepMat);
      step.position.set(0, yPos - 3, zPos); step.receiveShadow = true;
      stGroup.add(step);
      
      // Populate row with lively spectators
      for(let x = -CW/2 - 30; x <= CW/2 + 30; x += 11){
        if(Math.random() < 0.88){
          const col = crowdColors[Math.floor(Math.random()*crowdColors.length)];
          const spec = createSpectator(col);
          spec.position.set(x + (Math.random()*4-2), yPos + 3.2, zPos + (Math.random()*2-1));
          spec.rotation.y = dir === 1 ? Math.PI : 0;
          stGroup.add(spec);
          crowdInstances.push({mesh: spec, baseY: yPos + 3.2, phase: Math.random()*Math.PI*2, speed: 0.12 + Math.random()*0.15});
        }
      }
    }
  });
  
  // Baseline Stands (X axis)
  [-1, 1].forEach(dir => {
    for(let row=0; row<8; row++){
      const xPos = dir * (CW/2 + 30 + row*12);
      const yPos = row * 6 + 3;
      const step = new THREE.Mesh(new THREE.BoxGeometry(12, 6, CH + 20), standMat);
      step.position.set(xPos, yPos - 3, 0);
      stGroup.add(step);
      
      for(let z = -CH/2; z <= CH/2; z += 12){
        if(Math.random() < 0.82){
          const col = crowdColors[Math.floor(Math.random()*crowdColors.length)];
          const spec = createSpectator(col);
          spec.position.set(xPos, yPos + 3.2, z + (Math.random()*4-2));
          spec.rotation.y = dir === 1 ? -Math.PI/2 : Math.PI/2;
          stGroup.add(spec);
          crowdInstances.push({mesh: spec, baseY: yPos + 3.2, phase: Math.random()*Math.PI*2, speed: 0.12 + Math.random()*0.15});
        }
      }
    }
  });
  
  // Center-Hung LED Scoreboard (Jumbotron)
  const jumbo = new THREE.Group(); jumbo.position.set(0, 85, 0);
  const jBox = new THREE.Mesh(new THREE.BoxGeometry(44, 22, 44), new THREE.MeshStandardMaterial({color:0x090d16, metalness:0.8}));
  jumbo.add(jBox);
  
  const makeJFace = () => {
    const cv=document.createElement('canvas'); cv.width=512; cv.height=256;
    const c=cv.getContext('2d');
    c.fillStyle='#020617'; c.fillRect(0,0,512,256);
    c.fillStyle='#38bdf8'; c.font='900 44px Outfit'; c.textAlign='center';
    c.fillText('RIMSHOT PRO ARENA', 256, 65);
    c.fillStyle='#fbbf24'; c.font='bold 40px Share Tech Mono';
    c.fillText('SARIQ  00 — 00  OQ', 256, 145);
    c.fillStyle='#10b981'; c.font='900 34px Outfit';
    c.fillText('PERIOD 1  |  03:00', 256, 215);
    return new THREE.Mesh(new THREE.PlaneGeometry(40, 20), new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv)}));
  };
  
  const j1=makeJFace(); j1.position.set(0,0,22.2); jumbo.add(j1);
  const j2=makeJFace(); j2.position.set(0,0,-22.2); j2.rotation.y=Math.PI; jumbo.add(j2);
  const j3=makeJFace(); j3.position.set(22.2,0,0); j3.rotation.y=Math.PI/2; jumbo.add(j3);
  const j4=makeJFace(); j4.position.set(-22.2,0,0); j4.rotation.y=-Math.PI/2; jumbo.add(j4);
  stGroup.add(jumbo);
  
  // Arena Perimeter Walls & Columns
  const wallMat = new THREE.MeshStandardMaterial({color:0x030712, roughness:0.9});
  const wallL = new THREE.Mesh(new THREE.BoxGeometry(700, 140, 10), wallMat); wallL.position.set(0, 70, -210); stGroup.add(wallL);
  const wallR = new THREE.Mesh(new THREE.BoxGeometry(700, 140, 10), wallMat); wallR.position.set(0, 70, 210); stGroup.add(wallR);
  
  scene.add(stGroup);
}
function createSpectator(colHex){

const SKINS = [0xf5b041, 0xd4a76a, 0xc8956c, 0xa57b59, 0xf0d0a8, 0x8d5524];
const SHOES = [0xffffff, 0xdc2626, 0x2563eb, 0x10b981, 0xf59e0b];
const YNUM = ['#23', '#7', '#11', '#5', '#3'];
const WNUM = ['#99', '#14', '#8', '#2', '#21'];

function makeJerseyTexture(colorHex, numStr){
  const cv=document.createElement('canvas'); cv.width=128; cv.height=128;
  const c=cv.getContext('2d');
  c.fillStyle = colorHex; c.fillRect(0,0,128,128);
  c.font = '900 54px Outfit'; c.fillStyle = '#ffffff'; c.textAlign = 'center';
  c.fillText(numStr, 64, 84);
  return new THREE.CanvasTexture(cv);
}

class Player3D {
  constructor(id, x, z, team, isUser){
    this.id = id; this.team = team; this.isUser = isUser;
    this.pos = new THREE.Vector3(x, 0, z);
    this.vel = new THREE.Vector3(0, 0, 0);
    this.yaw = team === 0 ? Math.PI/2 : -Math.PI/2;
    this.targetYaw = this.yaw;
    this.speed = 0; this.jumping = false; this.jumpVy = 0;
    this.boost = 0; this.celeb = 0; this.hasBall = false;
    
    // Tactical 5v5 Positions (PG, SG, SF, PF, Center)
    const roleIdx = id % 5;
    const dir = team === 0 ? -1 : 1;
    const homeX = [dir*30, dir*60, dir*60, dir*90, dir*100][roleIdx];
    const homeZ = [0, -45, 45, -30, 25][roleIdx];
    this.homePos = new THREE.Vector3(homeX, 0, homeZ);
    
    this.group = new THREE.Group();
    this.group.position.copy(this.pos);
    scene.add(this.group);
    
    // Shadow
    const shMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.45});
    const shadow = new THREE.Mesh(new THREE.CircleGeometry(3.0, 16), shMat);
    shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.05;
    this.group.add(shadow);
    
    this.body = new THREE.Group();
    this.group.add(this.body);
    
    const skinColor = SKINS[id % SKINS.length];
    const shoeColor = SHOES[id % SHOES.length];
    const jerseyHex = team === 0 ? '#f59e0b' : '#1e293b';
    const numStr = team === 0 ? YNUM[roleIdx] : WNUM[roleIdx];
    
    const jTex = makeJerseyTexture(jerseyHex, numStr);
    const torsoMat = [
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({color: jerseyHex}),
      new THREE.MeshStandardMaterial({map: jTex}), // Front
      new THREE.MeshStandardMaterial({map: jTex})  // Back
    ];
    
    // Athletic Sculpted Torso
    this.torso = new THREE.Mesh(new THREE.BoxGeometry(3.4, 5.2, 1.9), torsoMat);
    this.torso.position.y = 7.6; this.torso.castShadow = true;
    this.body.add(this.torso);
    
    // Sculpted Head & Headband
    const headMat = new THREE.MeshStandardMaterial({color: skinColor, roughness:0.5});
    this.head = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), headMat);
    this.head.position.y = 11.5; this.head.castShadow = true;
    this.body.add(this.head);
    
    // Headband / Sweatband
    const bandMat = new THREE.MeshStandardMaterial({color: team===0 ? 0xdc2626 : 0xffffff});
    const band = new THREE.Mesh(new THREE.CylinderGeometry(1.52, 1.52, 0.5, 16), bandMat);
    band.position.y = 11.8; this.body.add(band);
    
    if(isUser){
      const arrMat = new THREE.MeshBasicMaterial({color: 0xfbbf24});
      const arr = new THREE.Mesh(new THREE.ConeGeometry(0.9, 2.2, 8), arrMat);
      arr.rotation.x = Math.PI; arr.position.y = 14.2;
      this.body.add(arr);
    }
    
    const limbMat = new THREE.MeshStandardMaterial({color: skinColor});
    const shoeMat = new THREE.MeshStandardMaterial({color: shoeColor});
    const sockMat = new THREE.MeshStandardMaterial({color: 0xffffff});
    
    // Athletic Arms with Wristbands
    this.armL = new THREE.Group(); this.armL.position.set(-2.2, 9.8, 0);
    const alMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 4.6, 1.0), limbMat); alMesh.position.y = -2.3; alMesh.castShadow=true;
    const alBand = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.6, 1.05), bandMat); alBand.position.y = -4.0;
    this.armL.add(alMesh); this.armL.add(alBand); this.body.add(this.armL);
    
    this.armR = new THREE.Group(); this.armR.position.set(2.2, 9.8, 0);
    const arMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 4.6, 1.0), limbMat); arMesh.position.y = -2.3; arMesh.castShadow=true;
    const arBand = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.6, 1.05), bandMat); arBand.position.y = -4.0;
    this.armR.add(arMesh); this.armR.add(arBand); this.body.add(this.armR);
    
    // Legs with Compression Socks & Pro Sneakers
    this.legL = new THREE.Group(); this.legL.position.set(-1.0, 5.0, 0);
    const lMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3.2, 1.2), limbMat); lMesh.position.y = -1.6; lMesh.castShadow=true;
    const lSock = new THREE.Mesh(new THREE.BoxGeometry(1.22, 1.6, 1.22), sockMat); lSock.position.y = -3.8;
    const lShoe = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.1, 1.8), shoeMat); lShoe.position.set(0, -4.6, 0.3); lShoe.castShadow=true;
    this.legL.add(lMesh); this.legL.add(lSock); this.legL.add(lShoe); this.body.add(this.legL);
    
    this.legR = new THREE.Group(); this.legR.position.set(1.0, 5.0, 0);
    const rMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3.2, 1.2), limbMat); rMesh.position.y = -1.6; rMesh.castShadow=true;
    const rSock = new THREE.Mesh(new THREE.BoxGeometry(1.22, 1.6, 1.22), sockMat); rSock.position.y = -3.8;
    const rShoe = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.1, 1.8), shoeMat); rShoe.position.set(0, -4.6, 0.3); rShoe.castShadow=true;
    this.legR.add(rMesh); this.legR.add(rSock); this.legR.add(rShoe); this.body.add(this.legR);
  }

  update(dt, sysT){
    if(this.boost > 0) this.boost--;
    if(this.celeb > 0) this.celeb--;
    
    if(this.jumping){
      this.pos.y += this.jumpVy;
      this.jumpVy -= 0.6;
      if(this.pos.y <= 0){
        this.pos.y = 0; this.jumping = false; this.jumpVy = 0;
      }
    }
    
    this.pos.add(this.vel);
    this.pos.x = Math.max(-CW/2 + 3, Math.min(CW/2 - 3, this.pos.x));
    this.pos.z = Math.max(-CH/2 + 3, Math.min(CH/2 - 3, this.pos.z));
    
    this.group.position.copy(this.pos);
    
    let diff = this.targetYaw - this.yaw;
    while(diff < -Math.PI) diff += Math.PI*2;
    while(diff > Math.PI) diff -= Math.PI*2;
    this.yaw += diff * 0.2;
    this.body.rotation.y = this.yaw;
    
    // Natural Athletic Gait & Dribble Stance
    const spd = this.vel.length();
    if(spd > 0.1 && !this.jumping){
      const freq = sysT * 0.28;
      this.legL.rotation.x = Math.sin(freq) * 0.75;
      this.legR.rotation.x = -Math.sin(freq) * 0.75;
      if(!this.hasBall){
        this.armL.rotation.x = -Math.sin(freq) * 0.65;
        this.armR.rotation.x = Math.sin(freq) * 0.65;
      } else {
        // Dribbling forward lean stance
        this.torso.rotation.x = 0.2;
        this.armR.rotation.x = -0.5 + Math.sin(sysT*0.3)*0.4;
      }
    } else if(!this.jumping){
      this.torso.rotation.x *= 0.8;
      this.legL.rotation.x *= 0.8; this.legR.rotation.x *= 0.8;
      if(!this.hasBall){ this.armL.rotation.x *= 0.8; this.armR.rotation.x *= 0.8; }
    }
    
    if(this.jumping){
      this.torso.rotation.x = -0.1;
      this.armL.rotation.x = Math.PI - 0.35;
      this.armR.rotation.x = Math.PI - 0.35;
      this.legL.rotation.x = -0.4; this.legR.rotation.x = 0.5;
    }
  }
}

let players = [], user = null;
function makeTeams(){
  players.forEach(p => scene.remove(p.group));
  players = [];
  const startZ = [0, -35, 35, -20, 20];
  for(let i=0; i<5; i++){
    const p = new Player3D(i, -40 - i*15, startZ[i], 0, i===0);
    if(i===0) user = p;
    players.push(p);
  }
  for(let i=0; i<5; i++){
    players.push(new Player3D(5+i, 40 + i*15, startZ[i], 1, false));
  }
}

// 7. 3D BASKETBALL PHYSICS
// ═══════════════════════════════════════════════════════════════════════════
const ballMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1.6, 16, 16),
  new THREE.MeshStandardMaterial({color: 0xea580c, roughness:0.3})
);
ballMesh.castShadow = true;
scene.add(ballMesh);

const ball = {
  pos: new THREE.Vector3(0, 5, 0),
  vel: new THREE.Vector3(0, 0, 0),
  carrier: null, carried: false, scored: false, imm: 0,
  update(sysT){
    if(this.imm > 0) this.imm--;
    
    if(this.carried && this.carrier){
      this.carrier.hasBall = true;
      const p = this.carrier;
      const handOffset = new THREE.Vector3(0, 4.5 + Math.abs(Math.sin(sysT*0.28))*3.5, 3.4);
      handOffset.applyAxisAngle(new THREE.Vector3(0,1,0), p.yaw);
      this.pos.copy(p.pos).add(handOffset);
      ballMesh.position.copy(this.pos);
      ballMesh.rotation.x += 0.12;
      return;
    }
    
    players.forEach(p => p.hasBall = false);
    
    this.pos.add(this.vel);
    this.vel.y -= 0.5;
    this.vel.x *= 0.98; this.vel.z *= 0.98;
    
    if(this.pos.y <= 1.6){
      this.pos.y = 1.6;
      if(this.vel.y < -1.5) snd.bounce();
      this.vel.y = -this.vel.y * 0.6;
      if(Math.abs(this.vel.y) < 0.8) this.vel.y = 0;
    }
    
    ballMesh.position.copy(this.pos);
    ballMesh.rotation.x += this.vel.z * 0.05;
    ballMesh.rotation.z -= this.vel.x * 0.05;
    
    if((Math.abs(this.pos.x) > CW/2 + 2 || Math.abs(this.pos.z) > CH/2 + 2) && !this.scored){
      snd.whistle(); popText('⚠️ OUT OF BOUNDS!', '#ef4444');
      this.scored = true;
      setTimeout(() => giveBallToTeam(this.pos.x < 0 ? 0 : 1), 800);
    }
    
    if(!this.scored && this.vel.y < 0){
      if(this.pos.distanceTo(HOOP_R) < 3.5 && Math.abs(this.pos.y - HOOP_R.y) < 2) scoreGoal(0);
      if(this.pos.distanceTo(HOOP_L) < 3.5 && Math.abs(this.pos.y - HOOP_L.y) < 2) scoreGoal(1);
    }
    
    if(this.imm === 0 && !this.carried){
      for(const p of players){
        if(p.pos.distanceTo(this.pos) < 5.8 && Math.abs(p.pos.y - this.pos.y) < 6){
          this.carried = true; this.carrier = p;
          this.vel.set(0,0,0);
          if(p === user) popText('🏀 TO\'P SIZDA!', '#fbbf24');
          break;
        }
      }
    }
  }
};

function doShoot(p){
  if(!ball.carried || ball.carrier !== p) return;
  const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
  ball.carried = false; ball.carrier = null; p.hasBall = false;
  ball.scored = false; ball.imm = 40;
  
  const dist = p.pos.distanceTo(targetHoop);
  const time = dist / 3.8;
  ball.vel.x = (targetHoop.x - ball.pos.x) / time;
  ball.vel.z = (targetHoop.z - ball.pos.z) / time;
  ball.vel.y = (targetHoop.y - ball.pos.y + 0.5 * 0.5 * time * time) / time;
  
  snd.swish();
  if(!p.jumping){ p.jumpVy = 1.6; p.jumping = true; }
}

function doPass(p){
  if(!ball.carried || ball.carrier !== p) return;
  const mates = players.filter(t => t.team === p.team && t !== p);
  const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
  mates.sort((a,b) => a.pos.distanceTo(targetHoop) - b.pos.distanceTo(targetHoop));
  const target = mates[0];
  
  ball.carried = false; ball.carrier = null; p.hasBall = false;
  ball.scored = false; ball.imm = 20;
  
  const time = 16;
  ball.vel.x = (target.pos.x - ball.pos.x) / time;
  ball.vel.z = (target.pos.z - ball.pos.z) / time;
  ball.vel.y = 1.2;
  
  snd.swish(); if(p === user) popText('📤 PASS!', '#38bdf8');
}

function giveBallToTeam(team){
  const tp = players.filter(p => p.team === team);
  if(!tp.length) return;
  const p = tp[0];
  ball.carried = true; ball.carrier = p;
  ball.scored = false; ball.imm = 25;
  ball.vel.set(0,0,0); ball.pos.copy(p.pos);
}

let uSc = 0, bSc = 0;
function scoreGoal(team){
  ball.scored = true; ball.vel.multiplyScalar(0.2);
  snd.whistle(); snd.celebrate();
  if(team === 0){
    uSc++; document.getElementById('sc-y').textContent = String(uSc*2).padStart(2,'0');
    popText('🏀 GOL! +2 OCHKO', '#fbbf24');
    players.filter(p => p.team===0).forEach(p => p.celeb = 80);
  } else {
    bSc++; document.getElementById('sc-w').textContent = String(bSc*2).padStart(2,'0');
    popText('🏀 RAQIB GOL UTRDI!', '#cbd5e1');
    players.filter(p => p.team===1).forEach(p => p.celeb = 80);
  }
  setTimeout(() => giveBallToTeam(team === 0 ? 1 : 0), 1200);
}

// ═══════════════════════════════════════════════════════════════════════════
// 8. 360° CAMERA & CORRECTED FORWARD MOVEMENT (Solving Up/W direction)
// ═══════════════════════════════════════════════════════════════════════════
let camYaw = Math.PI/2, camPitch = 0.35;
let isPointerLocked = false;

renderer.domElement.addEventListener('click', ()=>{
  if(gSt === 'play') renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', ()=>{
  isPointerLocked = (document.pointerLockElement === renderer.domElement);
});

document.addEventListener('mousemove', (e)=>{
  if(gSt !== 'play' || !user) return;
  if(isPointerLocked || e.buttons === 1){
    camYaw -= e.movementX * 0.006;
    camPitch = Math.max(0.1, Math.min(1.2, camPitch + e.movementY * 0.005));
  }
});

let lastTouchX = 0, lastTouchY = 0;
renderer.domElement.addEventListener('touchstart', (e)=>{
  if(e.touches.length === 1){ lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; }
});
renderer.domElement.addEventListener('touchmove', (e)=>{
  if(gSt === 'play' && e.touches.length === 1){
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    camYaw -= dx * 0.008;
    camPitch = Math.max(0.1, Math.min(1.2, camPitch + dy * 0.008));
    lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
  }
});

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function handleInput(){
  if(gSt !== 'play' || !user) return;
  if(keys['escape']){ togglePause(); return; }
  
  // W/ArrowUp moves forward AWAY from camera! S moves backward! A/D strafe left/right!
  let fwd = 0, str = 0;
  if(keys['w'] || keys['arrowup']) fwd += 1;
  if(keys['s'] || keys['arrowdown']) fwd -= 1;
  if(keys['a'] || keys['arrowleft']) str += 1;
  if(keys['d'] || keys['arrowright']) str -= 1;
  
  const spd = user.boost > 0 ? 1.6 : (diff==='easy' ? 1.1 : 1.3);
  
  if(fwd !== 0 || str !== 0){
    // Calculate exact angle: when fwd=1, offset=0, worldAngle=camYaw (directly away from camera into screen!)
    const offset = Math.atan2(str, fwd);
    const worldAngle = camYaw + offset;
    
    user.vel.x = Math.sin(worldAngle) * spd;
    user.vel.z = Math.cos(worldAngle) * spd;
    user.targetYaw = worldAngle;
  } else {
    user.vel.x *= 0.8; user.vel.z *= 0.8;
  }
  
  // Actions
  if((keys[' '] || keys['jump']) && !user.jumping && user.pos.y <= 0){
    user.jumpVy = 1.6; user.jumping = true; snd.bounce();
  }
  if(keys['k'] || keys['shoot']){
    keys['k']=false; keys['shoot']=false;
    if(ball.carrier === user) doShoot(user);
    else if(!ball.carried && ball.imm === 0 && user.pos.distanceTo(ball.pos) < 10){
      ball.carried = true; ball.carrier = user; ball.vel.set(0,0,0);
      popText('🏀 OLDIM!', '#fbbf24');
    } else if(ball.carrier && ball.carrier.team !== 0 && user.pos.distanceTo(ball.carrier.pos) < 10){
      ball.carrier = user; ball.carried = true; snd.steal();
      popText('🔥 STEAL!', '#10b981');
    }
  }
  if((keys['f'] || keys['pass']) && ball.carrier === user){
    keys['f']=false; keys['pass']=false; doPass(user);
  }
  if(keys['e'] || keys['boost']){
    keys['e']=false; keys['boost']=false; user.boost = 120; snd.steal();
    popText('⚡ BOOST!', '#38bdf8');
  }
}

function updateCamera(){
  if(!user) return;
  const dist = user.boost > 0 ? 36 : 30;
  const targetX = user.pos.x - Math.sin(camYaw) * dist * Math.cos(camPitch);
  const targetY = user.pos.y + 12 + Math.sin(camPitch) * dist;
  const targetZ = user.pos.z - Math.cos(camYaw) * dist * Math.cos(camPitch);
  
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.12);
  camera.lookAt(user.pos.x, user.pos.y + 9, user.pos.z);
}

// ═══════════════════════════════════════════════════════════════════════════
// 9. TACTICAL 5v5 SPACING AI
// ═══════════════════════════════════════════════════════════════════════════
function updateAI(){
  players.forEach(p => {
    if(p.isUser) return;
    if(p.celeb > 0){ p.vel.multiplyScalar(0.8); return; }
    
    const spd = diff==='hard' ? 1.25 : 1.05;
    const isOffense = (ball.carrier && ball.carrier.team === p.team) || (!ball.carrier && p.team === 0);
    const targetHoop = p.team === 0 ? HOOP_R : HOOP_L;
    
    if(ball.carrier === p){
      const dist = p.pos.distanceTo(targetHoop);
      if(dist < 55 && Math.random() < 0.03){ doShoot(p); return; }
      
      let minEnemyDist = 999;
      players.filter(o=>o.team!==p.team).forEach(o => {
        const d = p.pos.distanceTo(o.pos); if(d < minEnemyDist) minEnemyDist = d;
      });
      if(minEnemyDist < 12 && Math.random() < 0.05){ doPass(p); return; }
      
      p.targetYaw = Math.atan2(targetHoop.x - p.pos.x, targetHoop.z - p.pos.z);
      p.vel.x = Math.sin(p.targetYaw) * spd;
      p.vel.z = Math.cos(p.targetYaw) * spd;
    } 
    else if(!ball.carried){
      const allSorted = [...players].sort((a,b) => a.pos.distanceTo(ball.pos) - b.pos.distanceTo(ball.pos));
      if(allSorted[0] === p || allSorted[1] === p){
        p.targetYaw = Math.atan2(ball.pos.x - p.pos.x, ball.pos.z - p.pos.z);
        p.vel.x = Math.sin(p.targetYaw) * spd;
        p.vel.z = Math.cos(p.targetYaw) * spd;
      } else {
        moveToZone(p, p.homePos, spd * 0.8);
      }
    } 
    else if(isOffense){
      const dynamicHome = p.homePos.clone();
      dynamicHome.x += (ball.pos.x * 0.3);
      moveToZone(p, dynamicHome, spd * 0.85);
    } 
    else {
      const opp = players[p.id % 5 + (p.team===0 ? 5 : 0)];
      if(opp){
        const defPos = opp.pos.clone().lerp(p.team===0 ? HOOP_L : HOOP_R, 0.25);
        moveToZone(p, defPos, spd * 0.95);
        
        if(ball.carrier === opp && p.pos.distanceTo(opp.pos) < 10){
          if(Math.random() < 0.02){
            ball.carrier = p; ball.carried = true; snd.steal();
            popText('🤙 STEAL!', '#10b981');
          }
          if(opp.jumping && !p.jumping && Math.random() < 0.3){
            p.jumpVy = 1.6; p.jumping = true;
          }
        }
      }
    }
  });
  
  for(let i=0; i<players.length; i++){
    for(let j=i+1; j<players.length; j++){
      const a = players[i], b = players[j];
      const dist = a.pos.distanceTo(b.pos);
      if(dist < 5.0 && dist > 0.1){
        const push = (5.0 - dist) * 0.5;
        const dir = new THREE.Vector3().subVectors(b.pos, a.pos).normalize();
        a.pos.addScaledVector(dir, -push);
        b.pos.addScaledVector(dir, push);
      }
    }
  }
}

function moveToZone(p, target, spd){
  const dist = p.pos.distanceTo(target);
  if(dist > 3){
    p.targetYaw = Math.atan2(target.x - p.pos.x, target.z - p.pos.z);
    p.vel.x = Math.sin(p.targetYaw) * spd;
    p.vel.z = Math.cos(p.targetYaw) * spd;
  } else {
    p.vel.x *= 0.8; p.vel.z *= 0.8;
  }
}

const minimap = document.getElementById('minimap');
const mCtx = minimap.getContext('2d');
function drawMinimap(){
  minimap.width = 200; minimap.height = 112;
  mCtx.fillStyle = '#0f172a'; mCtx.fillRect(0, 0, 200, 112);
  mCtx.strokeStyle = '#94a3b8'; mCtx.lineWidth = 1.5;
  mCtx.strokeRect(6, 6, 188, 100);
  mCtx.beginPath(); mCtx.moveTo(100, 6); mCtx.lineTo(100, 106); mCtx.stroke();
  
  players.forEach(p => {
    const mx = 100 + (p.pos.x / (CW/2)) * 88;
    const my = 56 + (p.pos.z / (CH/2)) * 44;
    mCtx.fillStyle = p.isUser ? '#38bdf8' : (p.team===0 ? '#f59e0b' : '#ffffff');
    mCtx.beginPath(); mCtx.arc(mx, my, p.isUser ? 5.5 : 3.8, 0, Math.PI*2); mCtx.fill();
  });
  
  const bx = 100 + (ball.pos.x / (CW/2)) * 88;
  const by = 56 + (ball.pos.z / (CH/2)) * 44;
  mCtx.fillStyle = '#ea580c';
  mCtx.beginPath(); mCtx.arc(bx, by, 3.2, 0, Math.PI*2); mCtx.fill();
}

function popText(text, color){
  const div = document.createElement('div');
  div.textContent = text;
  div.style.position = 'fixed'; div.style.top = '35%'; div.style.left = '50%';
  div.style.transform = 'translate(-50%, -50%) scale(0.5)';
  div.style.background = 'rgba(15,23,42,0.95)'; div.style.color = color;
  div.style.padding = '14px 32px'; div.style.borderRadius = '35px';
  div.style.font = '900 30px Outfit'; div.style.border = `2px solid ${color}`;
  div.style.boxShadow = `0 0 30px ${color}`; div.style.zIndex = '90';
  div.style.transition = '0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
  document.body.appendChild(div);
  setTimeout(()=>div.style.transform = 'translate(-50%, -100%) scale(1.1)', 20);
  setTimeout(()=>{ div.style.opacity = '0'; setTimeout(()=>div.remove(), 300); }, 1200);
}

let gSt = 'setup', sysT = 0, mTim = 180, tEv = null;

function loop(){
  requestAnimationFrame(loop);
  sysT++;
  
  if(gSt === 'play'){
    handleInput();
    updateAI();
    players.forEach(p => p.update(0.016, sysT));
    ball.update(sysT);
    updateCamera();
    drawMinimap();
    
    // Animate Crowd Spectators jumping and cheering!
    crowdInstances.forEach(c => {
      c.mesh.position.y = c.baseY + Math.abs(Math.sin(sysT * c.speed + c.phase)) * 0.9;
    });
    
    const m = Math.floor(mTim/60), s = Math.floor(mTim%60);
    const te = document.getElementById('hud-timer');
    te.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    te.className = 'hs-c' + (mTim<=10 && mTim>0 ? ' urg' : '');
  }
  
  renderer.render(scene, camera);
}
loop();

function startGame(){
  const nm = document.getElementById('inp-name').value || 'Baller_Pro';
  const fl = document.getElementById('inp-country').value || '🇺🇿';
  diff = document.getElementById('inp-diff').value || 'medium';
  document.getElementById('hud-flag').textContent = fl + ' ' + nm;
  
  uSc = 0; bSc = 0; mTim = 180; sysT = 0;
  document.getElementById('sc-y').textContent = '00';
  document.getElementById('sc-w').textContent = '00';
  
  makeTeams();
  giveBallToTeam(0);
  
  ['ov-setup','ov-pause','ov-go'].forEach(id => document.getElementById(id).classList.add('hid'));
  gSt = 'play'; snd.init(); snd.startBGM();
  
  if(tEv) clearInterval(tEv);
  tEv = setInterval(()=>{
    if(gSt !== 'play') return;
    mTim--;
    if(mTim <= 10 && mTim > 0) snd.beep();
    if(mTim <= 0){ clearInterval(tEv); endMatch(); }
  }, 1000);
}

function togglePause(){
  if(gSt === 'play'){ gSt = 'pause'; snd.stopBGM(); document.getElementById('ov-pause').classList.remove('hid'); document.exitPointerLock(); }
  else if(gSt === 'pause') resumeGame();
}
function resumeGame(){ gSt = 'play'; snd.startBGM(); document.getElementById('ov-pause').classList.add('hid'); }
function showSetup(){ gSt = 'setup'; if(tEv) clearInterval(tEv); snd.stopBGM(); ['ov-setup','ov-pause','ov-go'].forEach(id => document.getElementById(id).classList.add('hid')); document.getElementById('ov-setup').classList.remove('hid'); document.exitPointerLock(); }

function endMatch(){
  gSt = 'over'; snd.stopBGM(); document.exitPointerLock();
  const w = uSc >= bSc;
  document.getElementById('go-t').textContent = w ? '🏆 G\'ALABA!' : '😢 YUTQIZDIK!';
  document.getElementById('go-w').textContent = w ? 'Sizning jamoangiz g\'alaba qozondi!' : 'Raqib jamoa g\'alaba qildi.';
  document.getElementById('go-s').textContent = `Sariq: ${uSc*2} — Oq: ${bSc*2}`;
  if(w) snd.celebrate();
  document.getElementById('ov-go').classList.remove('hid');
}

function bindT(id, keyStr){
  const el = document.getElementById(id); if(!el) return;
  el.addEventListener('touchstart', e=>{ e.preventDefault(); keys[keyStr]=true; },{passive:false});
  el.addEventListener('touchend', e=>{ e.preventDefault(); keys[keyStr]=false; },{passive:false});
  el.addEventListener('mousedown', ()=>keys[keyStr]=true);
  el.addEventListener('mouseup', ()=>keys[keyStr]=false);
}
bindT('tj','jump'); bindT('ts','shoot'); bindT('tp','pass'); bindT('te','boost');
