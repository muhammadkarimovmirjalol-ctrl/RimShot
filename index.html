<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RimShot – 5v5 Street Basketball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;font-family:'Outfit',sans-serif;color:#f8fafc;}
#hud{position:fixed;top:0;left:0;width:100%;z-index:50;background:rgba(10,14,26,0.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.hud-score{display:flex;align-items:center;background:#020617;border:2px solid rgba(255,255,255,0.12);border-radius:12px;overflow:hidden;}
.hud-team{display:flex;align-items:center;gap:8px;padding:4px 12px;}
.hud-num{font-family:'Share Tech Mono',monospace;font-size:26px;font-weight:bold;}
.hud-timer{padding:4px 16px;font-family:'Share Tech Mono',monospace;font-size:24px;font-weight:bold;color:#fbbf24;border-left:2px solid rgba(255,255,255,0.1);border-right:2px solid rgba(255,255,255,0.1);}
.hud-timer.urgent{color:#ef4444;animation:blink .5s infinite alternate;}
@keyframes blink{from{opacity:1}to{opacity:.4}}
.hud-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.badge.gold{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24;}
.btn-sm{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#cbd5e1;padding:4px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;}
.btn-sm.on{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.4);color:#fbbf24;}

#game-wrap{position:fixed;top:0;left:0;width:100%;height:100%;}
#cv{display:block;width:100%;height:100%;}

/* OVERLAYS */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(7,10,18,0.95);backdrop-filter:blur(20px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow-y:auto;}
.overlay.hidden{display:none!important;}
.big-title{font-size:42px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#fbbf24,#f87171,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
.card{background:rgba(15,23,42,0.9);border:1.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:18px 22px;width:420px;max-width:95%;display:flex;flex-direction:column;gap:10px;}
.card label{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;}
.card input,.card select{background:rgba(2,6,23,0.9)!important;border:1.5px solid rgba(255,255,255,0.18)!important;color:#fff!important;padding:9px 13px!important;border-radius:12px!important;font-size:13px!important;outline:none!important;width:100%!important;font-family:'Outfit',sans-serif!important;}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:#fff;font-size:15px;font-weight:900;padding:11px 36px;border-radius:28px;cursor:pointer;box-shadow:0 0 24px rgba(245,158,11,.5);letter-spacing:2px;text-transform:uppercase;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(245,158,11,.7);}

/* TOUCH CONTROLS */
#touch-controls{position:fixed;bottom:14px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 16px;z-index:60;pointer-events:none;}
.touch-group{display:flex;gap:8px;pointer-events:auto;}
.tbtn{width:52px;height:52px;border-radius:50%;background:rgba(15,23,42,.6);border:2px solid rgba(255,255,255,.22);backdrop-filter:blur(8px);color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.5);opacity:.75;transition:opacity .15s,transform .1s;}
.tbtn:active,.tbtn.pressed{opacity:1;transform:scale(.9);}
.tbtn.shoot{background:linear-gradient(135deg,rgba(245,158,11,.8),rgba(217,119,6,.8));border-color:#fde047;font-size:12px;width:58px;height:58px;}
.tbtn.pass{background:linear-gradient(135deg,rgba(37,99,235,.8),rgba(29,78,216,.8));border-color:#60a5fa;font-size:12px;width:52px;height:52px;}

/* MINIMAP */
#minimap{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(7,10,18,.7);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:4px;}

/* KEYS INFO */
#keys-info{position:fixed;top:64px;right:10px;background:rgba(7,10,18,.75);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 12px;font-size:11px;color:#94a3b8;z-index:55;line-height:1.9;}
.kbadge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:1px 6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#e2e8f0;}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-meta">
    <div class="badge" id="hud-name">🇺🇿 Baller_Pro</div>
    <div class="badge gold">🪙 <span id="hud-coins">2400</span></div>

  <div class="hud-score">
    <div class="hud-team">
      <div style="font-size:10px;font-weight:800;color:#fbbf24;" id="hud-user-team">SARIQ JAMOASI</div>

  <span class="kbadge">K</span> Shoot / Steal<br>

<!-- GAME CANVAS -->

</div>

<!-- MINIMAP CANVAS -->
<div id="minimap">

<!-- TOUCH CONTROLS -->
<div id="touch-controls">
  <div class="touch-group">
    <button class="tbtn" id="tl">◄</button>

<!-- SETUP OVERLAY -->
<div class="overlay" id="ov-setup">
  <div class="big-title">🏀 RIMSHOT 5v5</div>
  <p style="color:#94a3b8;font-size:13px;letter-spacing:2px;text-align:center;">Real Street Basketball — Sen o'ynaysan, jamoa bilan!</p>
  <div class="card">

        <option value="🇯🇵">🇯🇵 Japan</option>
        <option value="🇰🇷">🇰🇷 South Korea</option>

<!-- PAUSE OVERLAY -->
<div class="overlay hidden" id="ov-pause">
  <div class="big-title">PAUSE ⏸</div>
  <div style="display:flex;flex-direction:column;gap:12px;width:300px;">
    <button class="btn-gold" onclick="resumeGame()">▶ DAVOM ETTIRISH</button>
    <button class="btn-gold" style="background:linear-gradient(135deg,#059669,#10b981);" onclick="startGame()">🔄 QAYTADAN</button>
    <button class="btn-gold" style="background:linear-gradient(135deg,#dc2626,#b91c1c);" onclick="showSetup()">🏠 BOSH MENU</button>
  </div>
</div>

<!-- GAMEOVER OVERLAY -->
<div class="overlay hidden" id="ov-gameover">
  <div class="big-title" id="go-title">MATCH TUGADI!</div>
  <div id="go-winner" style="font-size:22px;font-weight:900;color:#fbbf24;text-align:center;"></div>
  <div id="go-scores" style="font-size:18px;color:#cbd5e1;text-align:center;margin:8px 0;"></div>
  <button class="btn-gold" onclick="startGame()">🔄 QAYTADAN O'YNASH</button>
  <button class="btn-gold" style="background:rgba(255,255,255,0.1);margin-top:-6px;" onclick="showSetup()">🏠 BOSH MENU</button>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS & CONFIG
// ─────────────────────────────────────────────
const WORLD_W = 2600; // Wide court world
const WORLD_H = 620;
const FLOOR_TOP = 360;   // Top depth of walkable area
const FLOOR_BOT = 560;   // Bottom depth
const FLOOR_MID = (FLOOR_TOP + FLOOR_BOT) / 2;
const HOOP_Y    = 305;   // Hoop center Y (fixed height for shooting)

// Hoops
const LEFT_HOOP  = { x: 95,         y: HOOP_Y, rimX: 95,         rimW: 60 };
const RIGHT_HOOP = { x: WORLD_W-95, y: HOOP_Y, rimX: WORLD_W-155, rimW: 60 };

// Player config
const PLAYER_H = 88;
const PLAYER_W = 28;

// ─────────────────────────────────────────────
// CANVAS SETUP (RESPONSIVE)
// ─────────────────────────────────────────────
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const mm   = document.getElementById('mm');
const mctx = mm.getContext('2d');

function resize() {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let gameState = 'setup'; // setup | playing | pause | gameover
let isDayTime = true;
let soundOn   = true;
let difficulty = 'medium';
let userScore = 0, botScore = 0;
let matchTimer = 180;
let timerEvent = null;
let systemTime = 0;
let cameraX = 0; // smooth camera X in world space
let screenShake = 0;
let userName = 'Baller_Pro';
let userFlag = '🇺🇿';
let textPopups = [];
let particleEffects = [];

// Ball
const ball = {
  x: WORLD_W / 2, y: FLOOR_MID,
  vx: 0, vy: 0, vz: 0,
  z: 0,         // "height" above ground (for arc)
  radius: 13,
  rotation: 0,
  carrier: null,
  isCarried: false,
  hasScored: false,
  immunityTimer: 0,
  isFireBall: false,
  skinId: 'default'
};

// ─────────────────────────────────────────────
// SOUND SYNTH
// ─────────────────────────────────────────────
class SoundSynth {
  constructor(){ this.ctx = null; this.enabled = true; this.bgmTimer = null; }
  init(){ if(this.ctx) return; try{ this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
  _note(freq, type='sine', dur=0.12, vol=0.15){
    if(!this.enabled || !this.ctx) return;
    try{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type=type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+dur);
      o.start(); o.stop(this.ctx.currentTime+dur+0.01);
    }catch(e){}
  }
  playBounce(){ this._note(110,'sine',0.09,0.08); }
  playSwish(){ this._note(800,'triangle',0.14,0.12); }
  playSteal(){ this._note(350,'sawtooth',0.08,0.1); }
  playCelebrate(){ this._note(520,'triangle',0.4,0.25); setTimeout(()=>this._note(780,'triangle',0.3,0.2),150); }
  playWhistle(){
    if(!this.enabled||!this.ctx) return;
    try{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type='sine'; o.frequency.setValueAtTime(2800,this.ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(3400,this.ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.22,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.35);
      o.start(); o.stop(this.ctx.currentTime+0.38);
    }catch(e){}
  }
  playBeep(){ this._note(900,'square',0.11,0.18); }
  startBGM(){
    if(this.bgmTimer) return; this.init(); if(!this.ctx) return;
    const melody=[261,329,392,523,440,349,293,246];
    let i=0;
    this.bgmTimer=setInterval(()=>{
      if(!soundOn||gameState!=='playing') return;
      this._note(melody[i%melody.length],'triangle',0.32,0.038);
      i++;
    },350);
  }
  stopBGM(){ if(this.bgmTimer){ clearInterval(this.bgmTimer); this.bgmTimer=null; } }
}
const synth = new SoundSynth();
function toggleSound(){
  soundOn=!soundOn; synth.enabled=soundOn;
  document.getElementById('btn-snd').textContent = soundOn ? '🔊' : '🔇';
  if(!soundOn) synth.stopBGM(); else if(gameState==='playing') synth.startBGM();
}

// ─────────────────────────────────────────────
// PLAYER CLASS
// ─────────────────────────────────────────────
const TEAM_YELLOW = 0;
const TEAM_WHITE  = 1;

// Jersey colors and names for teams
const yellowNames = ['#23','#7','#11','#5','#3'];
const whiteNames  = ['#99','#14','#8','#2','#21'];
const skinTones   = ['#f5b041','#c8956c','#f0c27a','#d4956a','#fcd5a8'];

class Player {
  constructor(id, x, y, team, isUser){
    this.id = id;
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.team = team;
    this.isUser = isUser;
    this.facing = team === TEAM_YELLOW ? 1 : -1;
    this.onGround = true;
    this.z = 0; this.vz = 0;
    this.boostTimer = 0;
    this.celebrateTimer = 0;
    this.dribblePhase = Math.random() * Math.PI * 2;

    // Appearance
    this.skinTone = skinTones[id % skinTones.length];
    this.jerseyColor  = team === TEAM_YELLOW ? '#f59e0b' : '#f8fafc';
    this.shortColor   = team === TEAM_YELLOW ? '#b45309' : '#cbd5e1';
    this.jerseyNum    = team === TEAM_YELLOW ? yellowNames[id % 5] : whiteNames[id % 5];
    this.hairColor    = ['#1e293b','#78350f','#292524','#0c4a6e'][id % 4];
    this.shoeColor    = ['#1e293b','#dc2626','#2563eb','#065f46'][id % 4];
  }

  get speed(){
    const base = difficulty==='easy' ? 3.4 : difficulty==='hard' ? 5.2 : 4.4;
    return this.boostTimer > 0 ? base * 1.65 : base;
  }

  update(){
    if(this.boostTimer > 0) this.boostTimer--;
    if(this.celebrateTimer > 0) this.celebrateTimer--;
    if(this.isUser){
      this.updateUser();
    } else {
      this.updateAI();
    }
    // Clamp to walkable zone
    this.x = Math.max(30, Math.min(WORLD_W - 30, this.x));
    this.y = Math.max(FLOOR_TOP, Math.min(FLOOR_BOT, this.y));
    this.dribblePhase += 0.18;
  }

  updateUser(){
    const spd = this.speed;
    let mx = 0, my = 0;
    if(keys['arrowleft']  || keys['a']) mx -= spd;
    if(keys['arrowright'] || keys['d']) mx += spd;
    if(keys['arrowup']    || keys['w']) my -= spd * 0.65;
    if(keys['arrowdown']  || keys['s']) my += spd * 0.65;
    if(mx !== 0) this.facing = mx > 0 ? 1 : -1;
    this.x += mx; this.y += my;
    this.vx = mx; this.vy = my;
  }

  updateAI(){
    if(this.celebrateTimer > 0){ this.vx *= 0.7; this.vy *= 0.7; return; }
    const spd = this.speed;

    if(ball.carrier === this){
      // Has ball: drive toward opponent hoop
      const targetX = this.team === TEAM_YELLOW ? RIGHT_HOOP.x - 100 : LEFT_HOOP.x + 100;
      const targetY = FLOOR_MID;
      this._moveTo(targetX, targetY, spd);

      // Shoot decision
      const hoopX = this.team === TEAM_YELLOW ? RIGHT_HOOP.x : LEFT_HOOP.x;
      const dist = Math.abs(this.x - hoopX);
      const shootChance = difficulty==='easy' ? 0.006 : difficulty==='hard' ? 0.018 : 0.011;
      if(dist < 380 && Math.random() < shootChance){
        performShoot(this);
      }
    } else if(!ball.isCarried){
      // Chase ball
      this._moveTo(ball.x, ball.y, spd * 0.9);
    } else {
      // Teammate or opponent has ball
      if(ball.carrier && ball.carrier.team === this.team){
        // Spread out, run to open spot
        const openX = this.team === TEAM_YELLOW
          ? 800 + this.id * 180
          : 1800 - this.id * 180;
        this._moveTo(openX, FLOOR_MID + (this.id % 3 - 1) * 50, spd * 0.75);
      } else {
        // Defend: get between ball carrier and our hoop
        if(ball.carrier){
          const guardX = ball.carrier.x + (this.team === TEAM_YELLOW ? -60 : 60);
          this._moveTo(guardX, ball.carrier.y, spd * 0.95);
        }
      }
    }
  }

  _moveTo(tx, ty, spd){
    const dx = tx - this.x, dy = ty - this.y;
    const dist = Math.hypot(dx, dy) || 1;
    const nx = dx/dist, ny = dy/dist;
    if(dist > 5){ this.x += nx * spd; this.y += ny * spd * 0.65; if(dx !== 0) this.facing = dx > 0 ? 1 : -1; }
    this.vx = nx * spd; this.vy = ny * spd * 0.65;
  }

  draw(camX){
    const sx = this.x - camX; // screen X
    const sy = this.y;        // screen Y (floor depth)

    // Scale by depth for perspective (players further "up" are smaller)
    const depthT = (sy - FLOOR_TOP) / (FLOOR_BOT - FLOOR_TOP);
    const scale  = 0.7 + depthT * 0.3;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.scale(this.facing * scale, scale);

    // === SHADOW ===
    ctx.save(); ctx.translate(0, 0); ctx.scale(1, 0.25);
    const shd = ctx.createRadialGradient(0,0,4,0,0,32);
    shd.addColorStop(0,'rgba(0,0,0,0.55)'); shd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = shd; ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // === CELEBRATE animation ===
    let celebrateOffset = 0;
    if(this.celebrateTimer > 0){
      celebrateOffset = -Math.abs(Math.sin(systemTime*0.5))*12;
    }

    // === LEGS ===
    const isMoving = Math.abs(this.vx) > 0.3 || Math.abs(this.vy) > 0.3;
    const stride = isMoving ? Math.sin(systemTime * 0.28) : 0;
    ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.strokeStyle = this.skinTone;

    // Left leg
    ctx.beginPath();
    ctx.moveTo(-5, -28 + celebrateOffset);
    ctx.quadraticCurveTo(-5 - stride*10, -14, -6 - stride*14, 0);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(5, -28 + celebrateOffset);
    ctx.quadraticCurveTo(5 + stride*10, -14, 6 + stride*14, 0);
    ctx.stroke();

    // === SHOES ===
    ctx.fillStyle = this.shoeColor;
    ctx.fillRect(-10-stride*14, -4, 16, 6);
    ctx.fillRect(2+stride*14, -4, 16, 6);
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillRect(-10-stride*14, -2, 16, 2);
    ctx.fillRect(2+stride*14, -2, 16, 2);

    // === SHORTS ===
    ctx.fillStyle = this.shortColor;
    ctx.fillRect(-13, -34 + celebrateOffset, 26, 10);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(-13,-34+celebrateOffset,26,4);

    // === TORSO / JERSEY ===
    const jerseyGrad = ctx.createLinearGradient(-13, -80+celebrateOffset, 13, -30+celebrateOffset);
    jerseyGrad.addColorStop(0, this.jerseyColor);
    jerseyGrad.addColorStop(1, this._darken(this.jerseyColor, 0.3));
    ctx.fillStyle = jerseyGrad;
    ctx.beginPath();
    ctx.moveTo(-14, -80+celebrateOffset);
    ctx.lineTo(14, -80+celebrateOffset);
    ctx.lineTo(12, -30+celebrateOffset);
    ctx.lineTo(-12, -30+celebrateOffset);
    ctx.closePath();
    ctx.fill();

    // Jersey seams
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-14,-80+celebrateOffset); ctx.lineTo(-12,-30+celebrateOffset); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(14,-80+celebrateOffset); ctx.lineTo(12,-30+celebrateOffset); ctx.stroke();

    // Jersey number
    ctx.fillStyle = this.team===TEAM_YELLOW ? '#0f172a' : '#0f172a';
    ctx.font = `bold 14px 'Outfit',sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(this.jerseyNum, 0, -50+celebrateOffset);

    // === ARMS ===
    ctx.lineWidth = 6.5; ctx.strokeStyle = this.skinTone; ctx.lineCap='round';
    const armSwing = isMoving ? stride * 0.7 : 0;
    // Left arm
    ctx.beginPath();
    ctx.moveTo(-12, -72+celebrateOffset);
    ctx.quadraticCurveTo(-16 + armSwing*8, -56, -14 + armSwing*10, -42);
    ctx.stroke();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(12, -72+celebrateOffset);
    ctx.quadraticCurveTo(16 - armSwing*8, -56, 14 - armSwing*10, -42);
    ctx.stroke();

    // === NECK ===
    ctx.fillStyle = this.skinTone;
    ctx.fillRect(-4, -90+celebrateOffset, 8, 12);

    // === HEAD ===
    ctx.beginPath();
    ctx.arc(0, -100+celebrateOffset, 13, 0, Math.PI*2);
    ctx.fillStyle = this.skinTone;
    ctx.fill();

    // === HAIR ===
    ctx.fillStyle = this.hairColor;
    ctx.beginPath();
    ctx.arc(0, -104+celebrateOffset, 11, Math.PI, 0);
    ctx.fill();

    // === EYES ===
    const blinking = systemTime % 200 > 194;
    if(!blinking){
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(5, -101+celebrateOffset, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#1e293b';
      ctx.beginPath(); ctx.arc(5.5, -101+celebrateOffset, 1.3, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle='#1e293b'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(3,-101+celebrateOffset); ctx.lineTo(7,-101+celebrateOffset); ctx.stroke();
    }

    // User indicator arrow
    if(this.isUser){
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('▼', 0, -122+celebrateOffset);
    }

    // Boost aura
    if(this.boostTimer > 0){
      ctx.save(); ctx.translate(0, -50+celebrateOffset);
      const aura = ctx.createRadialGradient(0,0,10,0,0,48);
      aura.addColorStop(0,'rgba(56,189,248,0.5)'); aura.addColorStop(1,'rgba(56,189,248,0)');
      ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,0,48,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  _darken(hex, amount){
    // Very simple darkening
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const d = 1 - amount;
    return `rgb(${Math.floor(r*d)},${Math.floor(g*d)},${Math.floor(b*d)})`;
  }
}

let players = [];
let userPlayer = null;

function createTeams(){
  players = [];
  // Yellow team (user is player 0)
  const yellowXs = [600, 900, 700, 1050, 800];
  const yellowYs = [FLOOR_MID, FLOOR_MID-45, FLOOR_MID+45, FLOOR_MID-30, FLOOR_MID+60];
  for(let i=0; i<5; i++){
    const isUser = i === 0;
    const p = new Player(i, yellowXs[i], yellowYs[i], TEAM_YELLOW, isUser);
    if(isUser){ p.jerseyColor='#f59e0b'; userPlayer = p; }
    players.push(p);
  }
  // White team (all AI)
  const whiteXs  = [2000, 1700, 1900, 1550, 1800];
  const whiteYs  = [FLOOR_MID, FLOOR_MID-45, FLOOR_MID+45, FLOOR_MID-30, FLOOR_MID+60];
  for(let i=0; i<5; i++){
    const p = new Player(5+i, whiteXs[i], whiteYs[i], TEAM_WHITE, false);
    players.push(p);
  }
}

const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())){
    if(document.activeElement.tagName !== 'INPUT') e.preventDefault();
  }
  handleKeyAction(k);
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function handleKeyAction(k){
  if(gameState !== 'playing') return;
  if(k === 'escape') { togglePause(); return; }
  // SHOOT
  if(k === 'k'){
    if(ball.carrier === userPlayer){
      performShoot(userPlayer);
    } else if(!ball.isCarried){
      tryPickup(userPlayer);
    } else if(ball.carrier && ball.carrier.team !== TEAM_YELLOW){
      trySteal(userPlayer, ball.carrier);
    }
  }
  // PASS or JUMP
  if(k === ' ' || k === 'space'){
    if(ball.carrier === userPlayer){
      performPass(userPlayer);
    } else {
      tryPickup(userPlayer);
    }
  }
  // BOOST
  if(k === 'e'){
    userPlayer.boostTimer = 140;
    synth.playSteal();
    popText(userPlayer.x, userPlayer.y-60, '⚡ BOOST!', '#38bdf8');
  }
}

// Touch buttons
function bindTouch(id, key){
  const el = document.getElementById(id);
  if(!el) return;
  const on  = () => { keys[key] = true;  handleKeyAction(key); };
  const off = () => { keys[key] = false; };
  el.addEventListener('touchstart', e => { e.preventDefault(); el.classList.add('pressed'); on(); }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); el.classList.remove('pressed'); off(); }, {passive:false});
  el.addEventListener('mousedown',  () => { el.classList.add('pressed'); on(); });
  el.addEventListener('mouseup',    () => { el.classList.remove('pressed'); off(); });
}
bindTouch('tl','arrowleft'); bindTouch('tr','arrowright');
bindTouch('tu','arrowup');   bindTouch('td','arrowdown');
bindTouch('ts','k');         bindTouch('tp',' ');
bindTouch('te','e');

// ─────────────────────────────────────────────
// BALL LOGIC
// ─────────────────────────────────────────────
function resetBall(possessingTeam){
  const px = possessingTeam === TEAM_YELLOW
    ? Math.max(...players.filter(p=>p.team===TEAM_YELLOW).map(p=>p.x)) - 20
    : Math.min(...players.filter(p=>p.team===TEAM_WHITE).map(p=>p.x)) + 20;

  ball.x = px; ball.y = FLOOR_MID;
  ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0;
  ball.hasScored = false; ball.immunityTimer = 0;
  ball.isFireBall = false;

  // Give to closest player on that team
  const team = players.filter(p => p.team === possessingTeam);
  const closest = team.reduce((a,b) =>
    Math.hypot(a.x-px, a.y-FLOOR_MID) < Math.hypot(b.x-px, b.y-FLOOR_MID) ? a : b
  );
  ball.carrier = closest;
  ball.isCarried = true;
}

let userStreak = 0, botStreak = 0;

function performShoot(shooter){
  if(!ball.isCarried || ball.carrier !== shooter) return;

  const isYellow = shooter.team === TEAM_YELLOW;
  const hoopX    = isYellow ? RIGHT_HOOP.x : LEFT_HOOP.x;
  const hoopY    = isYellow ? RIGHT_HOOP.y : LEFT_HOOP.y;

  ball.isCarried = false; ball.carrier = null;
  ball.hasScored = false; ball.immunityTimer = 50;

  // Calculate velocity to reach hoop
  const frames = 42;
  ball.vx = (hoopX - ball.x) / frames;
  ball.vy = (hoopY - ball.y) / frames;
  // Arc: use z for height
  ball.z  = 0;
  ball.vz = 14; // shoot upward

  synth.playSwish();
}

function performPass(passer){
  if(!ball.isCarried || ball.carrier !== passer) return;
  // Find nearest teammate (not passer) facing the hoop
  const teammates = players.filter(p => p.team === passer.team && p !== passer);
  if(!teammates.length) return;
  // Prefer teammate closer to opponent hoop
  const hoopX = passer.team===TEAM_YELLOW ? RIGHT_HOOP.x : LEFT_HOOP.x;
  teammates.sort((a,b) => Math.abs(a.x-hoopX) - Math.abs(b.x-hoopX));
  const target = teammates[0];
  ball.isCarried = false; ball.carrier = null;
  ball.hasScored = false; ball.immunityTimer = 30;
  const frames = 18;
  ball.vx = (target.x - ball.x) / frames;
  ball.vy = (target.y - ball.y) / frames;
  ball.z = 0; ball.vz = 4;
  synth.playSwish();
  popText(passer.x, passer.y-70, '📤 PASS!', '#60a5fa');
}

function tryPickup(player){
  if(ball.isCarried || ball.immunityTimer > 0) return;
  const dist = Math.hypot(player.x - ball.x, player.y - ball.y);
  if(dist < 45){
    ball.isCarried = true; ball.carrier = player;
    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
  }
}

function trySteal(stealer, holder){
  const dist = Math.hypot(stealer.x - holder.x, stealer.y - holder.y);
  if(dist < 70){
    ball.carrier = stealer; ball.isCarried = true;
    synth.playSteal();
    popText(stealer.x, stealer.y-60, '🤙 STEAL!', '#10b981');
  }
}

function updateBall(){
  if(ball.immunityTimer > 0) ball.immunityTimer--;

  if(ball.isCarried && ball.carrier){
    // Dribble position (at carrier's side)
    const dPhase = Math.abs(Math.sin(ball.carrier.dribblePhase));
    ball.x = ball.carrier.x + ball.carrier.facing * 18;
    ball.y = ball.carrier.y;
    // Dribble between hand and floor
    ball.z = dPhase * 52;
    ball.rotation += ball.carrier.facing * 0.09;
    // Auto-pickup for AI teammates
    if(!ball.carrier.isUser){
      players.forEach(p => {
        if(p.team===ball.carrier.team && p!==ball.carrier && ball.immunityTimer===0){
          const dist=Math.hypot(p.x-ball.x,p.y-ball.y);
          if(dist < 38 && Math.random() < 0.008){
            ball.carrier = p; ball.isCarried = true;
          }
        }
      });
    }
    return;
  }

  // Free ball physics
  ball.x  += ball.vx;
  ball.y  += ball.vy;
  ball.z  += ball.vz;
  ball.vz -= 0.45; // Gravity on z

  if(ball.z <= 0){
    ball.z = 0;
    if(ball.vz < -1.5){ synth.playBounce(); }
    ball.vz = -ball.vz * 0.62;
    if(Math.abs(ball.vz) < 0.8) ball.vz = 0;
  }

  ball.vx *= 0.978; ball.vy *= 0.978;
  ball.rotation += ball.vx * 0.05;

  // Wall bounce
  if(ball.x < 20 || ball.x > WORLD_W-20){
    ball.vx *= -0.6;
    ball.x = Math.max(20, Math.min(WORLD_W-20, ball.x));
    if(!ball.hasScored) {
      popText(ball.x, ball.y-40, '⚠️ OUT!', '#ef4444');
      synth.playWhistle();
      setTimeout(()=> resetBall(ball.x < WORLD_W/2 ? TEAM_YELLOW : TEAM_WHITE), 700);
    }
  }
  if(ball.y < FLOOR_TOP || ball.y > FLOOR_BOT){
    ball.vy *= -0.5;
    ball.y = Math.max(FLOOR_TOP, Math.min(FLOOR_BOT, ball.y));
  }

  // Check scoring
  if(!ball.hasScored){
    const dLeft  = Math.hypot(ball.x - LEFT_HOOP.x,  ball.y - LEFT_HOOP.y);
    const dRight = Math.hypot(ball.x - RIGHT_HOOP.x, ball.y - RIGHT_HOOP.y);
    if(ball.vx > 0 && dLeft < 55 && ball.z < 25){
      processScore(TEAM_YELLOW); // Yellow shot toward left hoop — NO, yellow shoots right
    }
    if(ball.vx < 0 && dLeft < 55 && ball.z < 25){
      processScore(TEAM_WHITE); // White scores on left hoop
    }
    if(ball.vx > 0 && dRight < 55 && ball.z < 25){
      processScore(TEAM_YELLOW); // Yellow scores on right hoop
    }
    if(ball.vx < 0 && dRight < 55 && ball.z < 25){
      processScore(TEAM_WHITE);
    }
  }

  // AI auto-pickup
  if(ball.immunityTimer === 0){
    players.forEach(p => {
      if(ball.isCarried) return;
      const dist = Math.hypot(p.x - ball.x, p.y - ball.y);
      if(dist < 40 && ball.z < 30){
        ball.isCarried = true; ball.carrier = p;
        ball.vx=0; ball.vy=0; ball.vz=0; ball.z=0;
      }
    });
  }
}

function processScore(scoringTeam){
  ball.hasScored = true;
  ball.vx *= 0.3; ball.vy *= 0.3;
  screenShake = 22;
  synth.playWhistle();
  synth.playCelebrate();

  if(scoringTeam === TEAM_YELLOW){
    userScore++; userStreak++; botStreak = 0;
    document.getElementById('hud-user-score').textContent = String(userScore*2).padStart(2,'0');
    popText(RIGHT_HOOP.x, RIGHT_HOOP.y-30, userStreak>=3?'🔥 HOT STREAK! +2':'SCORE! +2', '#fbbf24');
    players.filter(p=>p.team===TEAM_YELLOW).forEach(p=>{ p.celebrateTimer=80; });
  } else {
    botScore++; botStreak++; userStreak = 0;
    document.getElementById('hud-bot-score').textContent = String(botScore*2).padStart(2,'0');
    popText(LEFT_HOOP.x, LEFT_HOOP.y-30, 'SCORE! +2', '#f8fafc');
    players.filter(p=>p.team===TEAM_WHITE).forEach(p=>{ p.celebrateTimer=80; });
  }

  // Spawn goal particles
  const hx = scoringTeam===TEAM_YELLOW ? RIGHT_HOOP.x : LEFT_HOOP.x;
  for(let i=0;i<14;i++){
    particleEffects.push({
      x:hx, y:HOOP_Y,
      vx:(Math.random()-0.5)*7,
      vy:(Math.random()-0.5)*5 - 3,
      life:35, maxLife:35,
      color: scoringTeam===TEAM_YELLOW ? '#fbbf24' : '#f8fafc',
      r: Math.random()*5+2
    });
  }

  setTimeout(()=>{ resetBall(scoringTeam===TEAM_YELLOW ? TEAM_WHITE : TEAM_YELLOW); }, 1400);
}

// DRAWING
// ─────────────────────────────────────────────
function getCamera(){
  // Camera follows user player smoothly
  const targetCamX = userPlayer.x - cv.width * 0.4;
  cameraX += (targetCamX - cameraX) * 0.1;
  cameraX = Math.max(0, Math.min(WORLD_W - cv.width, cameraX));
  return cameraX;
}

function drawCourt(camX){
  const W = cv.width, H = cv.height;

  // ── SKY / BACKGROUND ──
  if(isDayTime){
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#0369a1'); sky.addColorStop(0.5,'#38bdf8'); sky.addColorStop(1,'#bae6fd');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    // Sun
    ctx.save();
    const sg = ctx.createRadialGradient(W*0.15,60,3,W*0.15,60,50);
    sg.addColorStop(0,'#fde047'); sg.addColorStop(1,'rgba(253,224,71,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(W*0.15,60,50,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fef08a'; ctx.beginPath(); ctx.arc(W*0.15,60,18,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Clouds
    drawClouds(camX);

    // Trees
    drawTrees(camX);
  } else {
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#020617'); sky.addColorStop(0.6,'#0f172a'); sky.addColorStop(1,'#1e293b');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    // Moon
    ctx.fillStyle='#f1f5f9'; ctx.beginPath(); ctx.arc(W*0.15,70,20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(W*0.15+6,70,17,0,Math.PI*2); ctx.fill();

    // Stars
    for(let i=0;i<40;i++){
      const sx=(i*137+87)%(W),sy=(i*57+20)%280;
      ctx.fillStyle=`rgba(255,255,255,${0.2+Math.random()*0.5})`;
      ctx.beginPath(); ctx.arc(sx,sy,Math.random()*1.5+0.3,0,Math.PI*2); ctx.fill();
    }

    drawTrees(camX);

    // Floodlights
    drawFloodlights(camX);
  }

  // ── COURT FLOOR ──
  // Asphalt floor
  const floorGrad = ctx.createLinearGradient(0, FLOOR_TOP, 0, H);
  if(isDayTime){
    floorGrad.addColorStop(0,'#c4862e'); floorGrad.addColorStop(0.5,'#a16207'); floorGrad.addColorStop(1,'#78350f');
  } else {
    floorGrad.addColorStop(0,'#6b3900'); floorGrad.addColorStop(1,'#3b1800');
  }
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0, FLOOR_TOP, W, H - FLOOR_TOP);

  // Floor planks texture
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  const ox = -(camX % 80);
  for(let xx=ox; xx<W+80; xx+=80){
    ctx.beginPath(); ctx.moveTo(xx, FLOOR_TOP); ctx.lineTo(xx, H); ctx.stroke();
  }
  for(let yy=FLOOR_TOP; yy<H; yy+=30){
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
  }

  // ── COURT LINES ──
  drawCourtLines(camX);
}

function drawClouds(camX){
  const W = cv.width;
  const cloudData = [[0.2,80,50,20],[0.5,55,70,14],[0.75,95,40,18],[0.9,65,55,12]];
  cloudData.forEach(([rx,cy,cw,ch])=>{
    const wx = rx * WORLD_W - camX;
    if(wx < -200 || wx > W+200) return;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.arc(wx,cy,cw,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(wx+cw*0.8,cy+5,cw*0.7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(wx-cw*0.7,cy+8,cw*0.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawTrees(camX){
  const W = cv.width;
  const windSway = Math.sin(systemTime*0.018)*6;
  const treePositions = [50,220,400,600,800,1000,1200,1400,1600,1800,2000,2200,2400];
  treePositions.forEach(tx=>{
    const sx = tx - camX;
    if(sx < -100 || sx > W+100) return;
    ctx.fillStyle = isDayTime ? '#166534' : '#14532d';
    ctx.fillRect(sx-5, 230, 10, 120);
    ctx.fillStyle = isDayTime ? '#15803d' : '#166534';
    ctx.beginPath(); ctx.arc(sx+windSway, 200, 45, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+windSway*0.7, 220, 30, 0, Math.PI*2); ctx.fill();
  });
}

function drawFloodlights(camX){
  const W = cv.width;
  const poles = [300, 800, 1300, 1800, 2300];
  poles.forEach(px=>{
    const sx = px - camX;
    if(sx<-200||sx>W+200) return;
    ctx.fillStyle='#475569'; ctx.fillRect(sx-5,160,10,200);
    ctx.fillStyle='#fbbf24'; ctx.fillRect(sx-20,158,40,12);
    // Light cone
    ctx.save();
    const cone = ctx.createRadialGradient(sx,170,5,sx,350,160);
    cone.addColorStop(0,'rgba(255,244,180,0.25)'); cone.addColorStop(1,'rgba(255,244,180,0)');
    ctx.fillStyle=cone;
    ctx.beginPath(); ctx.moveTo(sx,170); ctx.lineTo(sx-160,FLOOR_TOP); ctx.lineTo(sx+160,FLOOR_TOP); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

function drawCourtLines(camX){
  const W = cv.width;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=3;
  ctx.setLineDash([]);

  // Half-court line
  const hx = WORLD_W/2 - camX;
  ctx.beginPath(); ctx.moveTo(hx, FLOOR_TOP); ctx.lineTo(hx, FLOOR_BOT); ctx.stroke();

  // Center circle (ellipse for perspective)
  ctx.beginPath();
  ctx.ellipse(hx, FLOOR_MID, 90, 32, 0, 0, Math.PI*2);
  ctx.stroke();

  // Left 3-point arc (perspective ellipse)
  const lhx = LEFT_HOOP.x - camX;
  ctx.beginPath();
  ctx.ellipse(lhx, FLOOR_MID, 60, 20, 0, -Math.PI/2, Math.PI/2);
  ctx.stroke();
  // Left key/paint box
  ctx.strokeRect(lhx, FLOOR_MID-55, 180, 110);

  // Right 3-point arc
  const rhx = RIGHT_HOOP.x - camX;
  ctx.beginPath();
  ctx.ellipse(rhx, FLOOR_MID, 60, 20, 0, Math.PI/2, -Math.PI/2);
  ctx.stroke();
  // Right key/paint box
  ctx.strokeRect(rhx-180, FLOOR_MID-55, 180, 110);

  // Free throw circles
  ctx.beginPath(); ctx.ellipse(lhx+165, FLOOR_MID, 50,18,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(rhx-165, FLOOR_MID, 50,18,0,0,Math.PI*2); ctx.stroke();

  ctx.restore();
}

function drawHoops(camX){
  drawOneHoop(LEFT_HOOP, camX, 1);
  drawOneHoop(RIGHT_HOOP, camX, -1);
}

function drawOneHoop(hoop, camX, side){
  const W = cv.width;
  const sx = hoop.x - camX;
  if(sx < -200 || sx > W+200) return;

  const poleX = sx + (side === 1 ? -30 : 30);

  // Pole
  ctx.fillStyle='#475569'; ctx.fillRect(poleX-5, HOOP_Y-10, 10, FLOOR_BOT-HOOP_Y+80);

  // Backboard
  ctx.fillStyle='rgba(224,231,255,0.9)';
  ctx.fillRect(poleX-4, HOOP_Y-50, 8, 90);
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5;
  ctx.strokeRect(poleX-4, HOOP_Y-50, 8, 90);

  // Inner square on backboard
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2;
  ctx.strokeRect(poleX-3, HOOP_Y-20, 6, 28);

  // Rim (orange horizontal bar)
  ctx.fillStyle='#ff5500';
  ctx.fillRect(sx - (side===1 ? -2 : 60), HOOP_Y, 60, 6);
  ctx.strokeStyle='#cc3300'; ctx.lineWidth=1.5;
  ctx.strokeRect(sx - (side===1 ? -2 : 60), HOOP_Y, 60, 6);

  // Net
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5;
  for(let i=0; i<=5; i++){
    const nx = sx + (side===1 ? -2+i*10 : -52+i*10);
    ctx.beginPath(); ctx.moveTo(nx, HOOP_Y+6); ctx.lineTo(nx+(side===1?3:-3), HOOP_Y+32); ctx.stroke();
  }
  for(let i=0; i<=2; i++){
    const ny = HOOP_Y + 6 + i*9;
    ctx.beginPath(); ctx.moveTo(sx+(side===1?-2:-52), ny); ctx.lineTo(sx+(side===1?48:-2), ny); ctx.stroke();
  }
}

function drawBall(camX){
  const sx = ball.x - camX;
  const sy = ball.y - ball.z; // z lifts ball up visually

  // Shadow on floor
  const shadowAlpha = Math.max(0.08, 0.5 - ball.z/120);
  const shadowScale = Math.max(0.3, 1 - ball.z/200);
  ctx.save();
  ctx.translate(sx, ball.y);
  ctx.scale(shadowScale, 0.25 * shadowScale);
  const sdg = ctx.createRadialGradient(0,0,2,0,0,ball.radius*1.2);
  sdg.addColorStop(0, `rgba(0,0,0,${shadowAlpha})`); sdg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sdg; ctx.beginPath(); ctx.arc(0,0,ball.radius*1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save(); ctx.translate(sx, sy); ctx.rotate(ball.rotation);

  // Ball gradient
  const bg = ctx.createRadialGradient(-4,-4,2,0,0,ball.radius);
  if(ball.isFireBall){
    bg.addColorStop(0,'#fde047'); bg.addColorStop(0.5,'#f97316'); bg.addColorStop(1,'#dc2626');
  } else {
    bg.addColorStop(0,'#f97316'); bg.addColorStop(0.7,'#ea580c'); bg.addColorStop(1,'#c2410c');
  }
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(0,0,ball.radius,0,Math.PI*2); ctx.fill();

  // Seams
  ctx.strokeStyle='#1e1b18'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(0,0,ball.radius,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-ball.radius,0); ctx.lineTo(ball.radius,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-ball.radius); ctx.lineTo(0,ball.radius); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,ball.radius*0.65,-Math.PI*.5,Math.PI*.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,ball.radius*0.65,Math.PI*.5,Math.PI*1.5); ctx.stroke();
  ctx.restore();
}

function drawMinimap(){
  mctx.clearRect(0,0,200,60);
  mctx.fillStyle='rgba(15,23,42,0.9)'; mctx.fillRect(0,0,200,60);
  mctx.strokeStyle='rgba(255,255,255,0.2)'; mctx.lineWidth=1; mctx.strokeRect(0,0,200,60);

  // Court line
  mctx.strokeStyle='rgba(255,255,255,0.3)'; mctx.lineWidth=1;
  mctx.beginPath(); mctx.moveTo(100,0); mctx.lineTo(100,60); mctx.stroke();

  // Players
  players.forEach(p=>{
    const mx = (p.x/WORLD_W)*200;
    const my = ((p.y-FLOOR_TOP)/(FLOOR_BOT-FLOOR_TOP))*60;
    mctx.fillStyle = p.team===TEAM_YELLOW
      ? (p.isUser ? '#fde047' : '#f59e0b')
      : '#f8fafc';
    mctx.beginPath(); mctx.arc(mx,my, p.isUser?4:2.5, 0, Math.PI*2); mctx.fill();
  });

  // Ball
  const bx = (ball.x/WORLD_W)*200;
  const by = ((ball.y-FLOOR_TOP)/(FLOOR_BOT-FLOOR_TOP))*60;
  mctx.fillStyle='#f97316';
  mctx.beginPath(); mctx.arc(bx,by,3,0,Math.PI*2); mctx.fill();

  // Camera viewport
  mctx.strokeStyle='rgba(255,255,255,0.45)'; mctx.lineWidth=1.5;
  const cvx = (cameraX/WORLD_W)*200;
  const cvw = (cv.width/WORLD_W)*200;
  mctx.strokeRect(cvx,0,cvw,60);
}

function drawHUD(){
  const m = Math.floor(matchTimer/60);
  const s = Math.floor(matchTimer%60);
  const ts = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const timerEl = document.getElementById('hud-timer');
  timerEl.textContent = ts;
  timerEl.className = 'hud-timer' + (matchTimer<=10 && matchTimer>0 ? ' urgent' : '');
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(gameState === 'playing'){
    update();
  }
  render();
}

function update(){
  systemTime++;
  if(screenShake > 0) screenShake--;

  players.forEach(p => p.update());
  updateBall();

  // Possession check for idle free ball
  if(!ball.isCarried && ball.immunityTimer===0){
    let picked = false;
    players.forEach(p=>{
      if(picked) return;
      const dist = Math.hypot(p.x-ball.x, p.y-ball.y);
      if(dist < 42 && ball.z < 25){
        ball.isCarried=true; ball.carrier=p;
        ball.vx=0; ball.vy=0; ball.vz=0; ball.z=0;
        picked=true;
      }
    });
  }

  // Text popups
  textPopups.forEach(t=>{ t.life--; t.y+=t.vy; });
  textPopups = textPopups.filter(t=>t.life>0);

  // Particles
  particleEffects.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; });
  particleEffects = particleEffects.filter(p=>p.life>0);

  drawHUD();
}

function render(){
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);

  const camX = getCamera();

  ctx.save();
  if(screenShake > 0){
    ctx.translate((Math.random()-0.5)*10,(Math.random()-0.5)*10);
  }

  drawCourt(camX);
  drawHoops(camX);

  // Sort players by Y for depth ordering
  const sorted = [...players].sort((a,b)=>a.y-b.y);
  sorted.forEach(p => p.draw(camX));

  drawBall(camX);

  // Particles
  particleEffects.forEach(p=>{
    ctx.save();
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-camX, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Text popups
  textPopups.forEach(t=>{
    ctx.save();
    ctx.globalAlpha = t.life/55;
    ctx.font='900 20px "Outfit",sans-serif';
    ctx.fillStyle=t.color;
    ctx.textAlign='center';
    ctx.shadowColor=t.color; ctx.shadowBlur=10;
    ctx.fillText(t.text, t.x-camX, t.y);
    ctx.restore();
  });

  ctx.restore();

  drawMinimap();
}

// ─────────────────────────────────────────────
// GAME CONTROL
// ─────────────────────────────────────────────
function startGame(){
  userName = document.getElementById('inp-name').value || 'Baller_Pro';
  userFlag  = document.getElementById('inp-country').value || '🇺🇿';
  difficulty = document.getElementById('inp-diff').value || 'medium';

  document.getElementById('hud-name').textContent = userFlag + ' ' + userName;

  userScore = 0; botScore = 0; matchTimer = 180;
  userStreak = 0; botStreak = 0;
  textPopups = []; particleEffects = [];
  screenShake = 0; systemTime = 0;

  document.getElementById('hud-user-score').textContent = '00';
  document.getElementById('hud-bot-score').textContent  = '00';

  createTeams();

  // Ball tip-off: place at center, no carrier
  ball.x = WORLD_W/2; ball.y = FLOOR_MID;
  ball.vx=0; ball.vy=0; ball.z=0; ball.vz=0;
  ball.isCarried=false; ball.carrier=null;
  ball.hasScored=false; ball.immunityTimer=0;
  ball.isFireBall=false;

  // Give ball to user at start
  setTimeout(()=>{
    if(userPlayer){
      ball.isCarried=true; ball.carrier=userPlayer;
      popText(userPlayer.x, userPlayer.y-70,'🏀 SIZDA TOP!','#fbbf24');
    }
  }, 800);

  hideAll();
  gameState = 'playing';
  synth.init(); synth.startBGM();

  if(timerEvent) clearInterval(timerEvent);
  timerEvent = setInterval(()=>{
    if(gameState!=='playing') return;
    matchTimer--;
    if(matchTimer<=10 && matchTimer>0) synth.playBeep();
    if(matchTimer<=0){ clearInterval(timerEvent); endMatch(); }
  }, 1000);
}

function endMatch(){
  gameState = 'gameover';
  synth.stopBGM();
  const userPoints = userScore*2;
  const botPoints  = botScore*2;
  const userWin = userPoints >= botPoints;
  document.getElementById('go-title').textContent = userWin ? '🏆 G\'ALABA!' : '😢 YUTQIZDIK!';
  document.getElementById('go-winner').textContent = userWin
    ? `${userName} va jamoasi YUTDI!`
    : `Oq jamoa yutdi.`;
  document.getElementById('go-scores').textContent = `${userName}: ${userPoints} — Bot: ${botPoints}`;
  if(userWin) synth.playCelebrate();
  document.getElementById('ov-gameover').classList.remove('hidden');
}

function togglePause(){
  if(gameState==='playing'){
    gameState='pause';
    synth.stopBGM();
    document.getElementById('ov-pause').classList.remove('hidden');
  } else if(gameState==='pause'){
    resumeGame();
  }
}

function resumeGame(){
  gameState='playing';
  synth.startBGM();
  document.getElementById('ov-pause').classList.add('hidden');
}

function showSetup(){
  gameState='setup';
  if(timerEvent){ clearInterval(timerEvent); timerEvent=null; }
  synth.stopBGM();
  hideAll();
  document.getElementById('ov-setup').classList.remove('hidden');
}

function hideAll(){
  ['ov-setup','ov-pause','ov-gameover'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
}

function toggleDayNight(){
  isDayTime = !isDayTime;
  document.getElementById('btn-dn').textContent = isDayTime ? '☀️' : '🌙';
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('load',()=>{
  resize();
  gameState = 'setup';
  requestAnimationFrame(gameLoop);

  // Load saved name
  const saved = localStorage.getItem('rimshot_username');
  if(saved) document.getElementById('inp-name').value = saved;
});

window.addEventListener('beforeunload',()=>{
  const n = document.getElementById('inp-name').value;
  if(n) localStorage.setItem('rimshot_username', n);
});
</script>
