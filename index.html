<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RimShot 5v5 — Street Basketball</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Outfit',sans-serif;color:#f8fafc}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;width:100%;z-index:50;background:rgba(5,10,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.hs{display:flex;align-items:center;background:#020617;border:2px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden}
.hs-t{display:flex;align-items:center;gap:6px;padding:4px 10px}
.hs-n{font-family:'Share Tech Mono',monospace;font-size:26px;font-weight:bold}
.hs-c{padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:bold;color:#fbbf24;border-left:2px solid rgba(255,255,255,.1);border-right:2px solid rgba(255,255,255,.1)}
.hs-c.urg{color:#ef4444;animation:blnk .5s infinite alternate}
@keyframes blnk{from{opacity:1}to{opacity:.3}}
.hm{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:2px 8px;font-size:11px;font-weight:700}
.hb.gld{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:#fbbf24}
.hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#94a3b8;padding:3px 8px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700}
#cam-info{position:fixed;top:50px;right:8px;background:rgba(5,10,20,.82);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 10px;font-size:10px;color:#64748b;z-index:55;line-height:1.8}
.kb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:0 5px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#e2e8f0}
#cam-name{font-size:11px;font-weight:800;color:#fbbf24;margin-top:3px}
#tpad{position:fixed;bottom:10px;left:0;width:100%;padding:0 12px;display:flex;justify-content:space-between;align-items:flex-end;z-index:60;pointer-events:none}
.tg{display:flex;gap:5px;align-items:center;pointer-events:auto}
.tbtn{width:48px;height:48px;border-radius:50%;background:rgba(15,23,42,.6);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.5);opacity:.7}
.tbtn:active{opacity:1;transform:scale(.88)}
.tbtn.shoot{background:linear-gradient(135deg,rgba(245,158,11,.8),rgba(217,119,6,.8));border-color:#fde047;font-size:11px;width:56px;height:56px}
.tbtn.jump{background:linear-gradient(135deg,rgba(16,185,129,.8),rgba(5,150,105,.8));border-color:#6ee7b7;font-size:11px}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,10,20,.96);backdrop-filter:blur(20px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:18px;overflow-y:auto}
.ov.hid{display:none!important}
.big{font-size:40px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#fbbf24,#f87171,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.card{background:rgba(15,23,42,.9);border:1.5px solid rgba(255,255,255,.14);border-radius:18px;padding:16px 20px;width:380px;max-width:95%;display:flex;flex-direction:column;gap:9px}
.card label{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.card input,.card select{background:rgba(2,6,23,.9)!important;border:1.5px solid rgba(255,255,255,.16)!important;color:#fff!important;padding:8px 11px!important;border-radius:11px!important;font-size:13px!important;outline:none!important;width:100%!important;font-family:'Outfit',sans-serif!important}
.btn-g{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:#fff;font-size:15px;font-weight:900;padding:10px 34px;border-radius:26px;cursor:pointer;box-shadow:0 0 22px rgba(245,158,11,.5);letter-spacing:2px;text-transform:uppercase}
.btn-g:hover{transform:translateY(-2px)}
.btn-gh{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#94a3b8;padding:9px 28px;border-radius:26px;cursor:pointer;font-size:13px;font-weight:700}
</style>
</head>
<body>
<div id="hud">
  <div class="hm">
    <div class="hb" id="hud-flag">🇺🇿 Baller_Pro</div>
    <div class="hb gld">🪙 <span id="hud-coins">2400</span></div>
    <div class="hb" style="color:#38bdf8">LVL 5</div>
  </div>
  <div class="hs">
    <div class="hs-t"><div style="font-size:9px;font-weight:800;color:#fbbf24">SARIQ</div><div class="hs-n" style="color:#fbbf24" id="sc-y">00</div></div>
    <div class="hs-c" id="hud-timer">03:00</div>
    <div class="hs-t"><div class="hs-n" style="color:#fff" id="sc-w">00</div><div style="font-size:9px;font-weight:800;color:#fff">OQ</div></div>
  </div>
  <div style="display:flex;gap:5px">
    <button class="hbtn" id="btn-dn" onclick="toggleDN()">☀️</button>
    <button class="hbtn" onclick="toggleSnd()">🔊</button>
    <button class="hbtn" onclick="togglePause()">⏸</button>
  </div>
</div>
<div id="cam-info">
  <span class="kb">WASD</span>/<span class="kb">←→↑↓</span> Harakat · <span class="kb">Space</span> Sakra<br>
  <span class="kb">K</span> Shoot/Steal · <span class="kb">F</span> Pass · <span class="kb">E</span> Boost<br>
  <span class="kb">1-6</span> Kamera · <span class="kb">C</span> Almashtir<br>
  <div id="cam-name">📷 Tepadan Ko'rinish</div>
</div>
<canvas id="cv"></canvas>
<div id="tpad">
  <div class="tg">
    <button class="tbtn" id="tl">◄</button>
    <div style="display:flex;flex-direction:column;gap:4px"><button class="tbtn" id="tu">▲</button><button class="tbtn" id="td">▼</button></div>
    <button class="tbtn" id="tr">►</button>
  </div>
  <div class="tg">
    <button class="tbtn jump" id="tj">🦘</button>
    <button class="tbtn" id="tp" style="font-size:11px">📤</button>
    <button class="tbtn shoot" id="ts">🏀</button>
    <button class="tbtn" id="te" style="font-size:13px">⚡</button>
  </div>
</div>

<!-- OVERLAYS -->
<div class="ov" id="ov-setup">
  <div class="big">🏀 RIMSHOT 5v5</div>
  <p style="color:#94a3b8;font-size:12px;letter-spacing:2px;text-align:center">Ko'cha Basketbol · 5 vs 5</p>
  <div class="card">
    <div><label>Ism</label><input id="inp-name" value="Baller_Pro"/></div>
    <div><label>Davlat</label><select id="inp-country"><option value="🇺🇿">🇺🇿 O'zbekiston</option><option value="🇺🇸">🇺🇸 USA</option><option value="🇧🇷">🇧🇷 Brazil</option><option value="🇹🇷">🇹🇷 Turkey</option></select></div>
    <div><label>Qiyinlik</label><select id="inp-diff"><option value="easy">Oson</option><option value="medium" selected>O'rta</option><option value="hard">Qiyin</option></select></div>
  </div>
  <button class="btn-g" onclick="startGame()">🏀 BOSHLASH</button>
</div>
<div class="ov hid" id="ov-pause">
  <div class="big">PAUSE ⏸</div>
  <button class="btn-g" onclick="resumeGame()">▶ Davom</button>
  <button class="btn-g" style="background:linear-gradient(135deg,#059669,#10b981)" onclick="startGame()">🔄 Qaytadan</button>
  <button class="btn-gh" onclick="showSetup()">🏠 Menu</button>
</div>
<div class="ov hid" id="ov-go">
  <div class="big" id="go-t"></div>
  <div id="go-w" style="font-size:18px;font-weight:900;color:#fbbf24;text-align:center"></div>
  <div id="go-s" style="font-size:15px;color:#94a3b8;text-align:center"></div>
  <button class="btn-g" onclick="startGame()">🔄 Qaytadan</button>
  <button class="btn-gh" onclick="showSetup()">🏠 Menu</button>
</div>

<script>
// ═══════ WORLD ═══════
// Court is a rectangle in world space
const CW=900,CH=500; // court width, height (world units)
const HOOP_L={x:45,y:CH/2};
const HOOP_R={x:CW-45,y:CH/2};
const TY=0,TW=1;
const GRAV=0.55;

// ═══════ CANVAS ═══════
const cv=document.getElementById('cv'),C=cv.getContext('2d');
let SW,SH;
function resize(){cv.width=SW=innerWidth;cv.height=SH=innerHeight}
addEventListener('resize',resize);resize();

// ═══════ CAMERA ═══════
const cam={
  // Current camera transform
  x:CW/2,y:CH/2,zoom:1,angle:0,
  // Target
  tx:CW/2,ty:CH/2,tz:1,ta:0,
  mode:1
};
const CAM_NAMES={
  1:'📷 Tepadan Ko\'rinish',
  2:'📷 Yondan Ko\'rinish',
  3:'📷 Orqadan Ko\'rinish',
  4:'🎬 TV Broadcast',
  5:'🔷 Izometrik',
  6:'👁️ Yarim-3D Burchak'
};

function updateCam(){
  if(!user) return;
  const u=user,bx=ball.x,by=ball.y;
  const mx=(u.x+bx)*0.5, my=(u.y+by)*0.5;

  if(cam.mode===1){
    // TOP-DOWN — pure overhead
    cam.tx=mx; cam.ty=my;
    cam.tz=Math.min(SW,SH)/(CW*0.65);
    cam.ta=0;
  } else if(cam.mode===2){
    // SIDE VIEW — horizontal scroll, court at bottom
    cam.tx=mx; cam.ty=CH*0.48;
    cam.tz=SH/(CH*0.9);
    cam.ta=0;
  } else if(cam.mode===3){
    // BEHIND PLAYER — closer, behind
    cam.tx=u.x+u.facing*80; cam.ty=u.y;
    cam.tz=Math.min(SW,SH)/(CW*0.32);
    cam.ta=u.facing>0?0:Math.PI;
  } else if(cam.mode===4){
    // TV BROADCAST — diagonal, wide
    cam.tx=mx; cam.ty=my-60;
    cam.tz=Math.min(SW,SH)/(CW*0.58);
    cam.ta=-0.18+Math.sin(sysT*0.002)*0.06;
  } else if(cam.mode===5){
    // ISOMETRIC — 45° rotated
    cam.tx=mx; cam.ty=my;
    cam.tz=Math.min(SW,SH)/(CW*0.55);
    cam.ta=Math.PI/4;
  } else if(cam.mode===6){
    // SEMI-3D angle
    cam.tx=mx; cam.ty=my-40;
    cam.tz=Math.min(SW,SH)/(CW*0.5);
    cam.ta=-0.3;
  }

  // Smooth
  cam.x+=(cam.tx-cam.x)*0.08;
  cam.y+=(cam.ty-cam.y)*0.08;
  cam.zoom+=(cam.tz-cam.zoom)*0.06;
  cam.angle+=(cam.ta-cam.angle)*0.06;
}

function setCam(m){
  cam.mode=m;
  document.getElementById('cam-name').textContent=CAM_NAMES[m]||'📷 Kamera '+m;
}

function applyCamera(){
  C.translate(SW/2,SH/2);
  C.rotate(cam.angle);
  C.scale(cam.zoom,cam.zoom);
  C.translate(-cam.x,-cam.y);
}

// ═══════ SOUND ═══════
const snd={
  ac:null,
  init(){if(!this.ac)try{this.ac=new(AudioContext||webkitAudioContext)}catch(e){}},
  p(f,t='sine',d=.12,v=.12){if(!sndOn||!this.ac)return;try{const o=this.ac.createOscillator(),g=this.ac.createGain();o.connect(g);g.connect(this.ac.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,this.ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ac.currentTime+d);o.start();o.stop(this.ac.currentTime+d+.02)}catch(e){}},
  bounce(){this.p(120,'sine',.08,.08)},
  swish(){this.p(780,'triangle',.12,.1)},
  steal(){this.p(340,'sawtooth',.07,.1)},
  celebrate(){this.p(520,'triangle',.35,.18);setTimeout(()=>this.p(780,'triangle',.25,.14),150)},
  whistle(){this.p(2800,'sine',.3,.2)},
  beep(){this.p(900,'square',.08,.16)},
  _b:null,
  startBGM(){if(this._b)return;this.init();if(!this.ac)return;const m=[261,329,392,523,440,349,293,246];let i=0;this._b=setInterval(()=>{if(!sndOn||gSt!=='play')return;this.p(m[i%m.length],'triangle',.28,.03);i++},380)},
  stopBGM(){if(this._b){clearInterval(this._b);this._b=null}}
};
let sndOn=true;
function toggleSnd(){sndOn=!sndOn;if(!sndOn)snd.stopBGM();else if(gSt==='play')snd.startBGM()}

// ═══════ STATE ═══════
let gSt='setup',isDN=true,diff='medium';
let sysT=0,uSc=0,bSc=0,mTim=180,tEv=null,shake=0;
let pops=[],parts=[];
let players=[],user=null;

// Ball
const ball={x:CW/2,y:CH/2,z:0,vx:0,vy:0,vz:0,r:10,rot:0,
  carrier:null,carried:false,scored:false,imm:0};

// ═══════ PLAYER ═══════
const SKINS=['#f5b041','#d4a76a','#e5c58a','#c8956c','#fcd5a8','#a57b59','#f0d0a8','#d4956a','#f8d5aa','#c87941'];
const HAIRS=['#1e293b','#78350f','#3b0764','#0c4a6e','#292524','#1c1917'];
const SHOES=['#1e293b','#dc2626','#2563eb','#065f46','#7c3aed','#b45309'];
const YNUM=['#23','#7','#11','#5','#3'];
const WNUM=['#99','#14','#8','#2','#21'];

class Player{
  constructor(id,x,y,team,isU){
    this.id=id;this.x=x;this.y=y;this.z=0;this.vx=0;this.vy=0;this.vz=0;
    this.team=team;this.isUser=isU;this.facing=team===TY?1:-1;
    this.jumping=false;this.boost=0;this.celeb=0;this.dph=Math.random()*6.28;
    this.skin=SKINS[id%SKINS.length];
    this.hair=HAIRS[id%HAIRS.length];
    this.shoe=SHOES[id%SHOES.length];
    this.jersey=team===TY?'#f59e0b':'#e2e8f0';
    this.shorts=team===TY?'#92400e':'#94a3b8';
    this.num=team===TY?YNUM[id%5]:WNUM[id%5];
  }
  get spd(){const b=diff==='easy'?3.2:diff==='hard'?4.8:4;return this.boost>0?b*1.65:b}

  update(){
    if(this.boost>0)this.boost--;
    if(this.celeb>0)this.celeb--;
    this.dph+=.18;
    if(this.isUser)this._usr();else this._ai();
    // Jump
    if(this.vz||this.z>0){this.z+=this.vz;this.vz-=GRAV;if(this.z<=0){this.z=0;this.vz=0;this.jumping=false}}
    this.x=Math.max(18,Math.min(CW-18,this.x));
    this.y=Math.max(18,Math.min(CH-18,this.y));
  }

  _usr(){
    const s=this.spd;let mx=0,my=0;
    if(keys.arrowleft||keys.a)mx-=s;
    if(keys.arrowright||keys.d)mx+=s;
    if(keys.arrowup||keys.w)my-=s;
    if(keys.arrowdown||keys.s)my+=s;
    if(mx||my){
      if(Math.abs(mx)>Math.abs(my))this.facing=mx>0?1:-1;
    }
    this.x+=mx;this.y+=my;this.vx=mx;this.vy=my;
  }

  _ai(){
    if(this.celeb>0){this.vx*=.8;this.vy*=.8;return}
    const s=this.spd,hasBall=ball.carrier===this;
    const mH=this.team===TY?HOOP_R:HOOP_L;
    const oH=this.team===TY?HOOP_L:HOOP_R;
    const mates=players.filter(p=>p.team===this.team&&p!==this);
    const opps=players.filter(p=>p.team!==this.team);

    if(hasBall){
      const dist=Math.hypot(this.x-mH.x,this.y-mH.y);
      const sDist=diff==='hard'?350:diff==='easy'?200:270;
      const sP=diff==='hard'?.025:diff==='easy'?.008:.014;
      let nD=9e9;opps.forEach(o=>{const d=Math.hypot(o.x-this.x,o.y-this.y);if(d<nD)nD=d});
      const blk=nD<65;
      if(blk&&Math.random()<.04){
        const open=mates.filter(t=>{const c=opps.reduce((m,o)=>Math.min(m,Math.hypot(o.x-t.x,o.y-t.y)),9e9);return c>80});
        if(open.length){doPass(this);return}
      }
      if(dist<sDist&&Math.random()<sP&&(nD>45||Math.random()<.3)){doShoot(this);return}
      let tx=mH.x-(this.team===TY?1:-1)*120,ty=mH.y;
      if(blk)ty+=(this.y>CH/2?-1:1)*50;
      this._to(tx,ty,s);
      if(sysT%120<2&&Math.random()<.05)doPass(this);
    }else if(!ball.carried){
      this._to(ball.x,ball.y,s*.88);
    }else if(ball.carrier&&ball.carrier.team===this.team){
      const sl=this.id%5,dir=this.team===TY?1:-1;
      const px=Math.max(100,Math.min(CW-100,ball.carrier.x));
      const offs=[{dx:150,dy:-80},{dx:150,dy:80},{dx:-80,dy:0},{dx:220,dy:-40},{dx:220,dy:40}];
      const o=offs[sl];
      this._to(Math.max(30,Math.min(CW-30,px+o.dx*dir)),Math.max(30,Math.min(CH-30,CH/2+o.dy)),s*.68);
      if(Math.random()<.003&&!this.jumping){this.vz=9;this.jumping=true}
    }else{
      if(ball.carrier){
        const sl=this.id%5,zf=.25+sl*.12;
        const zx=oH.x+(ball.carrier.x-oH.x)*zf;
        const zy=ball.carrier.y+(sl%3-1)*55;
        this._to(zx,Math.max(25,Math.min(CH-25,zy)),s*.88);
        const d=Math.hypot(this.x-ball.carrier.x,this.y-ball.carrier.y);
        const stP=diff==='hard'?.014:diff==='easy'?.004:.008;
        if(d<50&&ball.carrier.z<25&&Math.random()<stP){
          ball.carrier=this;ball.carried=true;snd.steal();pop(this.x,this.y,'🤙 STEAL!','#10b981');
        }
        const cH=Math.hypot(ball.carrier.x-oH.x,ball.carrier.y-oH.y);
        if(d<60&&cH<250&&!this.jumping&&Math.random()<.008){
          this.vz=12;this.jumping=true;pop(this.x,this.y,'🖐️ BLOCK!','#ef4444');
        }
      }
    }
  }

  _to(tx,ty,sp){
    const dx=tx-this.x,dy=ty-this.y,d=Math.hypot(dx,dy)||1;
    if(d>4){
      this.x+=dx/d*sp;this.y+=dy/d*sp;
      this.vx=dx/d*sp;this.vy=dy/d*sp;
      if(Math.abs(dx)>2)this.facing=dx>0?1:-1;
    }
  }

  draw(){
    const sc=1,PH=38,PW=8;
    const mov=Math.abs(this.vx)>.3||Math.abs(this.vy)>.3;
    const stride=mov&&this.z<3?Math.sin(sysT*.32):0;
    const jz=this.z;

    C.save();
    C.translate(this.x,this.y);

    // Shadow
    if(jz>1){
      C.save();C.scale(1,.35);
      const sg=C.createRadialGradient(0,0,2,0,0,18);
      sg.addColorStop(0,'rgba(0,0,0,.5)');sg.addColorStop(1,'rgba(0,0,0,0)');
      C.fillStyle=sg;C.beginPath();C.arc(0,0,18,0,6.28);C.fill();C.restore();
    }

    C.translate(0,-jz);

    // Boost glow
    if(this.boost>0){
      const ag=C.createRadialGradient(0,-PH/2,5,0,-PH/2,35);
      ag.addColorStop(0,'rgba(56,189,248,.4)');ag.addColorStop(1,'rgba(56,189,248,0)');
      C.fillStyle=ag;C.beginPath();C.arc(0,-PH/2,35,0,6.28);C.fill();
    }

    // Legs
    C.strokeStyle=this.skin;C.lineWidth=5;C.lineCap='round';
    C.beginPath();C.moveTo(-3,-12);C.lineTo(-4-stride*8,-1);C.stroke();
    C.beginPath();C.moveTo(3,-12);C.lineTo(4+stride*8,-1);C.stroke();

    // Shoes
    C.fillStyle=this.shoe;
    C.fillRect(-7-stride*8,-3,8,4);
    C.fillRect(0+stride*8,-3,8,4);

    // Shorts
    C.fillStyle=this.shorts;
    C.fillRect(-8,-17,16,7);

    // Jersey
    const jg=C.createLinearGradient(-PW,-PH+5,PW,-15);
    jg.addColorStop(0,this.jersey);jg.addColorStop(1,darken(this.jersey,.2));
    C.fillStyle=jg;
    C.beginPath();C.moveTo(-PW-1,-PH+5);C.lineTo(PW+1,-PH+5);C.lineTo(PW,-16);C.lineTo(-PW,-16);C.closePath();C.fill();

    // Number
    C.fillStyle=this.team===TY?'#451a03':'#334155';
    C.font='bold 8px Outfit';C.textAlign='center';C.textBaseline='middle';
    C.fillText(this.num,0,-25);

    // Arms
    C.strokeStyle=this.skin;C.lineWidth=4;
    const aw=mov?stride*.5:0;
    C.beginPath();C.moveTo(-PW-1,-PH+10);C.lineTo(-PW-4+aw*6,-22);C.stroke();
    C.beginPath();C.moveTo(PW+1,-PH+10);C.lineTo(PW+4-aw*6,-22);C.stroke();

    // Head
    C.fillStyle=this.skin;
    C.beginPath();C.arc(0,-PH-2,8,0,6.28);C.fill();
    // Hair
    C.fillStyle=this.hair;
    C.beginPath();C.arc(0,-PH-4,7,Math.PI,0);C.fill();
    // Eye
    const blink=sysT%230>224;
    if(!blink){
      C.fillStyle='#fff';C.beginPath();C.arc(this.facing*3,-PH-2,2,0,6.28);C.fill();
      C.fillStyle='#1e293b';C.beginPath();C.arc(this.facing*3.5,-PH-2,1,0,6.28);C.fill();
    }

    // User marker
    if(this.isUser){
      C.fillStyle='#fbbf24';C.font='bold 14px Arial';C.textAlign='center';
      C.shadowColor='#fbbf24';C.shadowBlur=10;
      C.fillText('▼',0,-PH-16);C.shadowBlur=0;
    }

    // Celebrate
    if(this.celeb>0){
      C.globalAlpha=this.celeb/90;C.font='18px Arial';C.fillText('🎉',0,-PH-22);C.globalAlpha=1;
    }

    C.restore();
  }
}

function darken(h,a){try{let s=h.replace('#','');if(s.length===3)s=s.split('').map(c=>c+c).join('');const r=parseInt(s.slice(0,2),16),g=parseInt(s.slice(2,4),16),b=parseInt(s.slice(4,6),16);return`rgb(${r*(1-a)|0},${g*(1-a)|0},${b*(1-a)|0})`}catch(e){return h}}

// ═══════ COURT DRAWING ═══════
function drawCourt(){
  // Floor
  const fg=C.createLinearGradient(0,0,CW,CH);
  if(isDN){fg.addColorStop(0,'#c27c2b');fg.addColorStop(.5,'#a16207');fg.addColorStop(1,'#8b5810')}
  else{fg.addColorStop(0,'#6b3800');fg.addColorStop(1,'#3b1800')}
  C.fillStyle=fg;C.fillRect(0,0,CW,CH);

  // Plank lines
  C.strokeStyle='rgba(0,0,0,.08)';C.lineWidth=1;
  for(let x=0;x<CW;x+=45){C.beginPath();C.moveTo(x,0);C.lineTo(x,CH);C.stroke()}

  // Court outline
  C.strokeStyle='rgba(255,255,255,.6)';C.lineWidth=3;
  C.strokeRect(15,15,CW-30,CH-30);

  // Half court
  C.beginPath();C.moveTo(CW/2,15);C.lineTo(CW/2,CH-15);C.stroke();
  C.beginPath();C.arc(CW/2,CH/2,60,0,6.28);C.stroke();

  // Paint boxes
  C.strokeRect(15,CH/2-80,130,160);
  C.strokeRect(CW-145,CH/2-80,130,160);

  // Free throw circles
  C.beginPath();C.arc(145,CH/2,50,0,6.28);C.stroke();
  C.beginPath();C.arc(CW-145,CH/2,50,0,6.28);C.stroke();

  // 3-point arcs
  C.lineWidth=2;C.strokeStyle='rgba(255,255,255,.4)';
  C.beginPath();C.arc(45,CH/2,180,-Math.PI*.4,Math.PI*.4);C.stroke();
  C.beginPath();C.arc(CW-45,CH/2,180,Math.PI*.6,Math.PI*1.4);C.stroke();

  // 3pt line extensions
  C.beginPath();C.moveTo(15,CH/2-170);C.lineTo(145,CH/2-170);C.stroke();
  C.beginPath();C.moveTo(15,CH/2+170);C.lineTo(145,CH/2+170);C.stroke();
  C.beginPath();C.moveTo(CW-15,CH/2-170);C.lineTo(CW-145,CH/2-170);C.stroke();
  C.beginPath();C.moveTo(CW-15,CH/2+170);C.lineTo(CW-145,CH/2+170);C.stroke();
}

function drawHoop(hoop,side){
  const hx=hoop.x,hy=hoop.y;
  // Backboard
  C.fillStyle='rgba(200,220,255,.85)';
  C.fillRect(hx+side*(-5),hy-30,5,60);
  C.strokeStyle='#fff';C.lineWidth=2;C.strokeRect(hx+side*(-5),hy-30,5,60);
  // Pole
  C.fillStyle='#475569';
  C.fillRect(hx+side*(-12),hy-3,side*(-15),6);
  // Rim
  C.strokeStyle='#ff5500';C.lineWidth=3;
  C.beginPath();C.arc(hx+side*22,hy,12,0,6.28);C.stroke();
  // Net lines
  C.strokeStyle='rgba(255,255,255,.5)';C.lineWidth=1;
  for(let i=-2;i<=2;i++){
    C.beginPath();C.moveTo(hx+side*22+i*4,hy+12);C.lineTo(hx+side*22+i*3,hy+28);C.stroke();
  }
}

function drawBall(){
  const b=ball;
  if(b.carried&&b.carrier){
    b.x=b.carrier.x+b.carrier.facing*14;
    b.y=b.carrier.y-8;
    b.z=b.carrier.z+Math.abs(Math.sin(b.carrier.dph))*22;
  }

  C.save();C.translate(b.x,b.y-b.z);C.rotate(b.rot);
  const br=b.r;
  const bg=C.createRadialGradient(-br*.25,-br*.25,br*.1,0,0,br);
  bg.addColorStop(0,'#f97316');bg.addColorStop(.7,'#ea580c');bg.addColorStop(1,'#c2410c');
  C.fillStyle=bg;C.beginPath();C.arc(0,0,br,0,6.28);C.fill();
  C.strokeStyle='#1e1b18';C.lineWidth=Math.max(1,br*.1);
  C.beginPath();C.arc(0,0,br,0,6.28);C.stroke();
  C.beginPath();C.moveTo(-br,0);C.lineTo(br,0);C.stroke();
  C.beginPath();C.moveTo(0,-br);C.lineTo(0,br);C.stroke();
  C.restore();

  // Shadow on ground
  if(b.z>2){
    C.save();C.translate(b.x,b.y);C.scale(1,.3);
    C.fillStyle=`rgba(0,0,0,${Math.max(.1,.4-b.z/120)})`;
    C.beginPath();C.arc(0,0,br,0,6.28);C.fill();C.restore();
  }
}

// ═══════ BALL PHYSICS ═══════
function updateBall(){
  if(ball.imm>0)ball.imm--;
  if(ball.carried&&ball.carrier)return;

  ball.x+=ball.vx;ball.y+=ball.vy;ball.z+=ball.vz;
  ball.vz-=GRAV*.5;ball.vx*=.98;ball.vy*=.98;ball.rot+=ball.vx*.04;
  if(ball.z<=0){ball.z=0;if(ball.vz<-1.5)snd.bounce();ball.vz=-ball.vz*.5;if(Math.abs(ball.vz)<.8)ball.vz=0}
  ball.x=Math.max(5,Math.min(CW-5,ball.x));
  ball.y=Math.max(5,Math.min(CH-5,ball.y));

  // Out of bounds
  if((ball.x<=8||ball.x>=CW-8||ball.y<=8||ball.y>=CH-8)&&!ball.scored){
    snd.whistle();pop(ball.x,ball.y,'⚠️ OUT!','#ef4444');ball.scored=true;
    setTimeout(()=>giveBall(ball.x<CW/2?TY:TW),700);
  }

  // Score check
  if(!ball.scored&&ball.vz<0){
    if(Math.hypot(ball.x-HOOP_R.x-22,ball.y-HOOP_R.y)<18&&ball.z<15)scoreGoal(TY);
    if(Math.hypot(ball.x-HOOP_L.x+22,ball.y-HOOP_L.y)<18&&ball.z<15)scoreGoal(TW);
  }

  // Pickup
  if(ball.imm===0&&!ball.carried){
    for(const p of players){
      if(Math.hypot(p.x-ball.x,p.y-ball.y)<35&&ball.z<35&&Math.abs(p.z-ball.z)<30){
        ball.carried=true;ball.carrier=p;ball.vx=0;ball.vy=0;ball.vz=0;break;
      }
    }
  }
}

function doShoot(p){
  if(!ball.carried||ball.carrier!==p)return;
  const h=p.team===TY?HOOP_R:HOOP_L;
  ball.carried=false;ball.carrier=null;ball.scored=false;ball.imm=48;
  const fr=32;
  ball.vx=(h.x+22*(p.team===TY?1:-1)-ball.x)/fr;
  ball.vy=(h.y-ball.y)/fr;
  ball.vz=14;
  snd.swish();
  if(!p.jumping){p.vz=11;p.jumping=true}
}

function doPass(p){
  if(!ball.carried||ball.carrier!==p)return;
  const tm=players.filter(t=>t.team===p.team&&t!==p);
  if(!tm.length)return;
  const h=p.team===TY?HOOP_R:HOOP_L;
  tm.sort((a,b)=>Math.abs(a.x-h.x)-Math.abs(b.x-h.x));
  const t=tm[0];
  ball.carried=false;ball.carrier=null;ball.scored=false;ball.imm=24;
  const fr=16;
  ball.vx=(t.x-ball.x)/fr;ball.vy=(t.y-ball.y)/fr;ball.vz=4;
  snd.swish();pop(p.x,p.y,'📤 PASS!','#60a5fa');
}

function giveBall(team){
  const tp=players.filter(p=>p.team===team);if(!tp.length)return;
  const p=tp[0];ball.carried=true;ball.carrier=p;
  ball.scored=false;ball.imm=25;ball.vx=0;ball.vy=0;ball.vz=0;ball.z=0;
}

function scoreGoal(team){
  ball.scored=true;ball.vx*=.2;ball.vy*=.2;ball.vz*=.2;
  shake=18;snd.whistle();snd.celebrate();
  if(team===TY){
    uSc++;document.getElementById('sc-y').textContent=String(uSc*2).padStart(2,'0');
    pop(HOOP_R.x,HOOP_R.y,'🏀 GOL! +2','#fbbf24');
    players.filter(p=>p.team===TY).forEach(p=>p.celeb=90);
  }else{
    bSc++;document.getElementById('sc-w').textContent=String(bSc*2).padStart(2,'0');
    pop(HOOP_L.x,HOOP_L.y,'🏀 GOL! +2','#f1f5f9');
    players.filter(p=>p.team===TW).forEach(p=>p.celeb=90);
  }
  for(let i=0;i<14;i++)parts.push({x:team===TY?HOOP_R.x:HOOP_L.x,y:CH/2,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,color:team===TY?'#fbbf24':'#f1f5f9',r:2+Math.random()*3,life:40,ml:40});
  setTimeout(()=>giveBall(team===TY?TW:TY),1200);
}

function pop(x,y,text,color){pops.push({x,y,text,color,life:55,ml:55})}

// ═══════ INPUT ═══════
const keys={};
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)&&document.activeElement.tagName!=='INPUT')e.preventDefault();
  onKey(k);
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function onKey(k){
  if(gSt!=='play'||!user)return;
  if(k==='escape'){togglePause();return}
  if(k>='1'&&k<='6')setCam(+k);
  if(k==='c')setCam(cam.mode%6+1);

  if(k==='k'){
    if(ball.carrier===user)doShoot(user);
    else if(!ball.carried&&ball.imm===0&&Math.hypot(user.x-ball.x,user.y-ball.y)<45&&ball.z<40){
      ball.carried=true;ball.carrier=user;ball.vx=0;ball.vy=0;ball.vz=0;
      pop(user.x,user.y,'🏀 OLDIM!','#fbbf24');
    }else if(ball.carrier&&ball.carrier.team!==TY){
      const d=Math.hypot(user.x-ball.carrier.x,user.y-ball.carrier.y);
      if(d<60){ball.carrier=user;ball.carried=true;snd.steal();pop(user.x,user.y,'🔥 STEAL!','#10b981')}
    }
  }
  if(k===' '&&!user.jumping&&user.z<=0){user.vz=14;user.jumping=true;snd.bounce()}
  if(k==='f'&&ball.carrier===user)doPass(user);
  if(k==='e'){user.boost=140;snd.steal();pop(user.x,user.y,'⚡ BOOST!','#38bdf8')}
}

function bindBtn(id,k){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;onKey(k)},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false},{passive:false});
  el.addEventListener('mousedown',()=>{keys[k]=true;onKey(k)});
  el.addEventListener('mouseup',()=>keys[k]=false);
}
bindBtn('tl','arrowleft');bindBtn('tr','arrowright');
bindBtn('tu','arrowup');bindBtn('td','arrowdown');
bindBtn('ts','k');bindBtn('tj',' ');bindBtn('tp','f');bindBtn('te','e');

// ═══════ TEAMS ═══════
function makeTeams(){
  players=[];
  const yx=[250,350,280,400,320],yy=[CH/2,CH/2-100,CH/2+100,CH/2-50,CH/2+70];
  for(let i=0;i<5;i++){const p=new Player(i,yx[i],yy[i],TY,i===0);if(i===0)user=p;players.push(p)}
  const wx=[CW-250,CW-350,CW-280,CW-400,CW-320],wy=[CH/2,CH/2-100,CH/2+100,CH/2-50,CH/2+70];
  for(let i=0;i<5;i++)players.push(new Player(5+i,wx[i],wy[i],TW,false));
}

// ═══════ LOOP ═══════
function update(){
  sysT++;if(shake>0)shake--;
  updateCam();
  if(gSt!=='play')return;
  players.forEach(p=>p.update());
  // Collision
  for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
    const a=players[i],b=players[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
    if(d<22&&d>.5){const p=(22-d)*.5;a.x-=dx/d*p;a.y-=dy/d*p;b.x+=dx/d*p;b.y+=dy/d*p}
  }
  updateBall();
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});
  parts=parts.filter(p=>p.life>0);
  pops.forEach(p=>p.life--);pops=pops.filter(p=>p.life>0);
  // Timer HUD
  const m=Math.floor(mTim/60),s=Math.floor(mTim%60);
  const te=document.getElementById('hud-timer');
  te.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  te.className='hs-c'+(mTim<=10&&mTim>0?' urg':'');
}

function render(){
  C.clearRect(0,0,SW,SH);

  // Background
  if(isDN){
    const bg=C.createLinearGradient(0,0,0,SH);
    bg.addColorStop(0,'#0c4a6e');bg.addColorStop(.6,'#0ea5e9');bg.addColorStop(1,'#bae6fd');
    C.fillStyle=bg;
  }else{
    const bg=C.createLinearGradient(0,0,0,SH);
    bg.addColorStop(0,'#020617');bg.addColorStop(1,'#1e293b');
    C.fillStyle=bg;
  }
  C.fillRect(0,0,SW,SH);

  C.save();
  if(shake>0)C.translate((Math.random()-.5)*8,(Math.random()-.5)*8);
  applyCamera();

  drawCourt();
  drawHoop(HOOP_L,1);
  drawHoop(HOOP_R,-1);

  // Sort by Y (top first for overlap)
  const sorted=[...players].sort((a,b)=>a.y-b.y);
  // Draw ball among players based on y position
  let ballDrawn=false;
  sorted.forEach(p=>{
    if(!ballDrawn&&(ball.carried?ball.carrier===p:ball.y<=p.y)){drawBall();ballDrawn=true}
    p.draw();
  });
  if(!ballDrawn)drawBall();

  // Particles
  parts.forEach(p=>{
    C.save();C.globalAlpha=p.life/p.ml;C.fillStyle=p.color;
    C.beginPath();C.arc(p.x,p.y,p.r,0,6.28);C.fill();C.restore();
  });

  // Popups
  pops.forEach(p=>{
    C.save();C.globalAlpha=p.life/p.ml;
    C.font='bold 16px Outfit';C.fillStyle=p.color;C.textAlign='center';
    C.shadowColor=p.color;C.shadowBlur=8;
    C.fillText(p.text,p.x,p.y-30-(1-p.life/p.ml)*25);
    C.shadowBlur=0;C.restore();
  });

  C.restore();
}

function loop(){requestAnimationFrame(loop);update();render()}

// ═══════ GAME CTRL ═══════
function startGame(){
  const nm=document.getElementById('inp-name').value||'Baller_Pro';
  const fl=document.getElementById('inp-country').value||'🇺🇿';
  diff=document.getElementById('inp-diff').value||'medium';
  document.getElementById('hud-flag').textContent=fl+' '+nm;
  uSc=0;bSc=0;mTim=180;pops=[];parts=[];shake=0;sysT=0;
  document.getElementById('sc-y').textContent='00';
  document.getElementById('sc-w').textContent='00';
  makeTeams();
  ball.x=CW/2;ball.y=CH/2;ball.z=0;ball.vx=0;ball.vy=0;ball.vz=0;
  ball.carried=false;ball.carrier=null;ball.scored=false;ball.imm=0;
  setTimeout(()=>{if(user){ball.carried=true;ball.carrier=user;pop(CW/2,CH/2,'🏀 SIZDA TOP!','#fbbf24')}},500);
  hideOvs();gSt='play';snd.init();snd.startBGM();setCam(1);
  if(tEv)clearInterval(tEv);
  tEv=setInterval(()=>{if(gSt!=='play')return;mTim--;if(mTim<=10&&mTim>0)snd.beep();if(mTim<=0){clearInterval(tEv);endMatch()}},1000);
}

function endMatch(){
  gSt='over';snd.stopBGM();
  const u2=uSc*2,b2=bSc*2,w=u2>=b2;
  document.getElementById('go-t').textContent=w?'🏆 G\'ALABA!':'😢 YUTQIZDIK!';
  document.getElementById('go-w').textContent=w?'Sizning jamoangiz g\'alaba qozondi!':'Raqib jamoa g\'alaba qildi.';
  document.getElementById('go-s').textContent=`Sariq: ${u2} — Oq: ${b2}`;
  if(w)snd.celebrate();
  document.getElementById('ov-go').classList.remove('hid');
}

function togglePause(){
  if(gSt==='play'){gSt='pause';snd.stopBGM();document.getElementById('ov-pause').classList.remove('hid')}
  else if(gSt==='pause')resumeGame();
}
function resumeGame(){gSt='play';snd.startBGM();document.getElementById('ov-pause').classList.add('hid')}
function showSetup(){gSt='setup';if(tEv){clearInterval(tEv);tEv=null}snd.stopBGM();hideOvs();document.getElementById('ov-setup').classList.remove('hid')}
function hideOvs(){['ov-setup','ov-pause','ov-go'].forEach(id=>document.getElementById(id).classList.add('hid'))}
function toggleDN(){isDN=!isDN;document.getElementById('btn-dn').textContent=isDN?'☀️':'🌙'}

addEventListener('load',()=>{resize();gSt='setup';requestAnimationFrame(loop);const s=localStorage.getItem('rimshot_user');if(s)document.getElementById('inp-name').value=s});
addEventListener('beforeunload',()=>{const n=document.getElementById('inp-name').value;if(n)localStorage.setItem('rimshot_user',n)});
</script>
